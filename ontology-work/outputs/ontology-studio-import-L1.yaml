# Ontology: FlowFlex Onboarding Workflow Engine
# Lossless compression from 205,612 chars

nodes:

  # --- BusinessObject ---
  ActionDefinition:
    t: BusinessObject
    d: "Defines an automated action that can be triggered by events in the system. Types include Python scripts, HTTP API calls, and SendEmail. Reusable across multiple trigger points."
    c: "ActionDefinition is the automation engine of FlowFlex. Properties: ActionCode, ActionName, ActionType (Python/HttpApi/SendEmail), Description, ActionConfig (JSONB - execution parameters varying by type), IsEnabled, IsTools, IsAIGenerated, TriggerType (Stage/Task/Question/Workflow/Integration). Actions execute when triggered by stage completion, task completion, or questionnaire answers via ActionTriggerMapping. Database table: ff_action_definitions."
    states:
      Action Enabled:
        d: Action is enabled and can be triggered.
        c: "Entry condition: Created with IsEnabled=true or re-enabled. Action will execute when matching trigger events occur. Exit condition: IsEnabled set to false (disabled)."
      Action Disabled:
        d: Action is disabled and will not execute.
        c: "Entry condition: IsEnabled set to false. Action exists but will not execute even when trigger events occur. Exit condition: IsEnabled set to true (re-enabled)."
  ActionExecution:
    t: BusinessObject
    d: "Records the execution of an ActionDefinition triggered by an ActionTriggerMapping. Tracks execution status, timing, input/output, and errors."
    c: "ActionExecution is the runtime execution record for actions. Properties: ActionDefinitionId, ExecutionId (unique string), ActionTriggerMappingId, ActionName, ActionType, TriggerContext (JSONB - event context that triggered execution), ExecutionStatus (Pending/Running/Completed/Failed/Cancelled/Timeout/Retrying), StartedAt, CompletedAt, DurationMs, ExecutionInput (JSONB), ExecutionOutput (JSONB), ErrorMessage, ErrorStackTrace, ExecutorInfo (JSONB). Database table: ff_action_executions."
    states:
      Execution Pending:
        d: Action execution created but not yet started.
        c: "Entry condition: Created with default status Pending. Exit condition: Execution starts (Running)."
      Execution Running:
        d: Action is currently executing.
        c: "Entry condition: Execution engine picks up the action. StartedAt is set. Exit condition: Completed, Failed, Cancelled, or Timeout."
      Execution Completed:
        d: Action executed successfully.
        c: "Entry condition: Action finishes without error. CompletedAt and DurationMs set. ExecutionOutput contains result. Terminal state."
      Execution Failed:
        d: Action execution failed with error.
        c: "Entry condition: Action throws error during execution. ErrorMessage and ErrorStackTrace captured. Exit condition: May transition to Retrying."
      Execution Timeout:
        d: Action exceeded its timeout threshold.
        c: "Entry condition: Execution duration exceeds configured timeout. Terminal state."
      Execution Retrying:
        d: Action is being retried after failure.
        c: "Entry condition: Retry logic triggered after Failed state. Exit condition: Completed, Failed, or Timeout on retry."
  ActionTriggerMapping:
    t: BusinessObject
    d: "Maps an ActionDefinition to a specific trigger source (Stage, Task, or Question) with event type, conditions, and execution order. Enables reusable action-to-event binding."
    c: "ActionTriggerMapping connects ActionDefinitions to trigger sources. Properties: ActionDefinitionId, TriggerType (Stage/Task/Question), TriggerSourceId, WorkFlowId, StageId, TriggerEvent (Completed/Created/Updated/Answered), IsEnabled, ExecutionOrder (smaller first), TriggerConditions (JSONB - conditional execution), MappingConfig (JSONB - custom parameters), Description. Multiple mappings on same trigger execute in ExecutionOrder. Database table: ff_action_trigger_mappings."
  Checklist:
    t: BusinessObject
    d: "A task list template or instance containing ordered ChecklistTasks. Assigned to Stages via Stage Components. Supports template/instance pattern."
    c: "Checklist is a container for ChecklistTasks. Type can be Template or Instance. Assigned to stages via components_json (a checklist can only be assigned to one stage within the same workflow). Properties: Name, Description, Team, Type (Template/Instance), Status (Active/Inactive), IsTemplate, TemplateId, EstimatedHours, IsActive. Database table: ff_checklist."
  ChecklistTask:
    t: BusinessObject
    d: "An individual task item within a Checklist. Supports task dependencies, assignees, priorities, due dates, and action bindings."
    c: "ChecklistTask is the execution unit within a Checklist. Properties: Name, Description, TaskType (Manual/Automatic/Document/Approval), IsCompleted, IsRequired, AssigneeId, AssigneeName, AssignedTeam, Priority (Low/Medium/High/Critical), Order, EstimatedHours, ActualHours, DueDate, CompletedDate, CompletionNotes, DependsOnTaskId (prerequisite task), Status (Pending/InProgress/Completed/Blocked/Cancelled), ActionId, ActionMappingId. Supports task dependencies via DependsOnTaskId with circular dependency validation. Database table: ff_checklist_task."
    states:
      Task Pending:
        d: Task created but not started.
        c: "Entry condition: Task created or uncompleted (reverted from Completed). Initial state. Exit condition: Task started (InProgress) or directly completed (Completed)."
      Task InProgress:
        d: Task is being worked on.
        c: "Entry condition: Task started by assignee. Exit condition: Task completed, blocked, or cancelled."
      Task Completed:
        d: Task has been completed with optional notes and actual hours.
        c: "Entry condition: CompleteTaskAsync with dependency check passed (CanCompleteAsync). Sets IsCompleted=true, CompletedDate, CompletionNotes, ActualHours, Status=Completed. Exit condition: UncompleteTaskAsync (if no completed dependents exist)."
      Task Blocked:
        d: Task is blocked by dependency or external factor.
        c: "Entry condition: Dependent task (DependsOnTaskId) not completed. Exit condition: Dependency resolved (dependent task completed)."
  ChecklistTaskCompletion:
    t: BusinessObject
    d: "Per-onboarding completion record for a checklist task. Tracks whether a specific task is completed for a specific onboarding instance."
    c: "ChecklistTaskCompletion bridges ChecklistTask (template) and Onboarding (instance). Allows same task definition to have different completion states per onboarding. Properties: OnboardingId, LeadId, ChecklistId, TaskId, StageId, IsCompleted, CompletedTime, CompletionNotes, FilesJson (file attachments), Source (customer_portal/admin/integration), IpAddress, UserAgent. Database table: ff_checklist_task_completion."
  DynamicData:
    t: BusinessObject
    d: "Dynamic data system consisting of DefineField (field definitions) and BusinessData (field values). Enables configurable custom fields per module without schema changes."
    c: "DynamicData is a meta-field system. DefineField defines field metadata: ModuleId, FieldName, Description, DataType (text/number/date/select/multi-select etc.), SourceType, IsSystemDefine, IsStatic, IsDisplayField, IsMustUse, IsRequired, IsHidden, IsComputed, AllowEdit, Sort, AdditionalInfo (JSONB). BusinessData stores actual values as JSONB. FieldGroup organizes fields. Supports computed fields, static fields, system-defined fields. Database tables: ff_define_field, ff_business_data, ff_data_value, ff_field_group."
  EmailBinding:
    t: BusinessObject
    d: "Manages email account bindings for Outlook integration. Tracks OAuth tokens, sync state, and delta links for incremental email synchronization."
    c: "EmailBinding connects a user's email account to FlowFlex for email sync. Properties: UserId, Email, Provider (e.g. Microsoft), AccessToken, RefreshToken, TokenExpireTime, LastSyncTime, SyncStatus, LastSyncError, AutoSyncEnabled, SyncIntervalMinutes, DeltaLinkInbox, DeltaLinkSent, DeltaLinkDeleted. Delta links enable incremental sync via Microsoft Graph API. Database table: ff_email_bindings."
  EntityMapping:
    t: BusinessObject
    d: "Maps external system entity types to FlowFlex entity types for integration data sync. Defines which external entities map to which workflows."
    c: "EntityMapping links external entity types to FlowFlex. Properties: IntegrationId, SystemId (auto-generated snowflake for external reference), ExternalEntityName, ExternalEntityType, WfeEntityType, WorkflowIds (JSON array), IsActive. Each mapping links an external entity type to WFE entity type and specific workflow IDs. Database table: ff_entity_mapping."
  Event:
    t: BusinessObject
    d: "System event record for tracking business events, supporting event sourcing patterns with retry logic and metadata."
    c: "Event captures business events in FlowFlex. Properties: EventId (unique string), EventType, EventVersion, EventTimestamp, AggregateId, AggregateType, EventSource, EventData (JSONB), EventMetadata (JSONB), EventDescription, EventStatus, ProcessCount, LastProcessedAt, ErrorMessage, RelatedEntityId, RelatedEntityType, EventTags (JSONB), RequiresRetry, NextRetryAt, MaxRetryCount. Supports retry logic for failed event processing. Database table: ff_events."
  FieldMapping:
    t: BusinessObject
    d: "Maps fields between an external system and FlowFlex for integration data synchronization. Defines field-level mapping with sync direction and type."
    c: "FieldMapping defines how individual fields map between external systems and FlowFlex during data sync. Properties: ActionId (links to IntegrationAction), ExternalFieldName, WfeFieldId, FieldType (enum), SyncDirection (enum - inbound/outbound/bidirectional), SortOrder, IsRequired, DefaultValue. Essential for Sync Integration Data process to know which external fields correspond to which FlowFlex fields. Database table: ff_inbound_field_mapping."
  Integration:
    t: BusinessObject
    d: "Represents a connection to an external system (CRM, ERP, Marketing, etc.). Manages authentication, entity mappings, field mappings, and data synchronization."
    c: "Integration connects FlowFlex to external systems. Properties: Type (CRM/ERP/Marketing), Name, Description, Status (Connected/Disconnected/Error/Pending), SystemName, EndpointUrl, AuthMethod (OAuth2/ApiKey/BasicAuth), EncryptedCredentials, LastSyncDate, ErrorMessage, InboundAttachments (JSON), OutboundAttachments (JSON). Has EntityMappings, IntegrationActions, QuickLinks. Database table: ff_integration."
  IntegrationAction:
    t: BusinessObject
    d: "Defines an action bound to an Integration that can be executed against the external system. Supports assignment to specific workflows."
    c: "IntegrationAction represents executable operations on an external system via Integration. Properties: IntegrationId, ActionCode, ActionName, ActionType (enum), Status (enum), AssignedWorkflowIds (JSON array - which workflows can use this action), Configuration (JSON - action-specific config). Links FieldMappings to define data transformation. Database table: ff_integration_action."
  InternalNote:
    t: BusinessObject
    d: "Internal team notes on an Onboarding or Stage. Supports threading (ParentNoteId), mentions, resolution tracking, and visibility control."
    c: "InternalNote is for team collaboration. Properties: OnboardingId, StageId (optional), Title, Content, NoteType (General/Important/Warning/Question), Priority (Low/Normal/High/Critical), IsResolved, ResolvedTime, ResolvedById, ResolvedBy, ResolutionNotes, Tags (JSONB), Visibility (Public/Internal/Private), MentionedUserIds (JSONB), Author, AuthorId, ParentNoteId (reply threading), Source. Database table: ff_internal_notes."
  Message:
    t: BusinessObject
    d: "Unified message entity supporting Internal messages, Email (via Outlook integration), and Portal messages. Supports threading, folders, labels, attachments, and read/star/archive states."
    c: "Message is the unified communication entity. Properties: Subject, Body, BodyPreview, MessageType (Internal/Email/Portal), Folder (Inbox/Sent/Starred/Archive/Trash), Labels (JSONB), SenderId, SenderName, SenderEmail, Recipients (JSONB), CcRecipients, BccRecipients, RelatedEntityType, RelatedEntityId, RelatedEntityCode, IsRead, IsStarred, IsArchived, IsDraft, HasAttachments, SentDate, ReceivedDate, ParentMessageId (threading), ConversationId (grouping), OwnerId (mailbox owner), OriginalFolder (for restore). Database table: ff_messages."
  MessageAttachment:
    t: BusinessObject
    d: "File attachment associated with a Message. Supports both regular attachments and inline content (e.g., embedded images)."
    c: "MessageAttachment stores file metadata for message attachments. Properties: MessageId, FileName, FileSize, ContentType, StoragePath, ExternalAttachmentId (for synced email attachments), ContentId (for inline images referenced in HTML body), IsInline (distinguishes inline vs regular attachment). Database table: ff_message_attachments."
  Onboarding:
    t: BusinessObject
    d: "A customer/lead onboarding workflow instance (also called \"Case\" in UI and permission system). Each Onboarding is created from a Workflow template and tracks the progress of a specific customer through all stages."
    c: "Onboarding is the core runtime business entity in FlowFlex. It tracks stage progress (CurrentStageId, CurrentStageOrder, StagesProgressJson), assignees, permissions (team-based and user-based via ViewPermissionSubjectType/OperatePermissionSubjectType toggle), priority, completion rate, ownership, lifecycle dates, and CRM lifecycle stage (LifeCycleStageId/LifeCycleStageName). Linked to CRM leads via LeadId/EntityId. CaseCode is the unique business identifier generated from CaseName. Supports complex permission model with ViewPermissionSubjectType (Team/User), OperatePermissionSubjectType (Team/User), ViewPermissionMode, ViewTeams, ViewUsers, OperateTeams, OperateUsers. Unlike Workflow/Stage which only support Team-based permissions, Onboarding supports both Team-based and User-based permission subjects. Database table: ff_onboarding."
    states:
      Onboarding Inactive:
        d: Onboarding is created but not yet started. Initial state.
        c: "Entry condition: Created via CreateAsync with default status \"Inactive\". Exit condition: StartOnboardingAsync transitions to Active. Only Inactive onboardings can be started. Allows configuration before activation."
      Onboarding Active:
        d: Onboarding is actively being processed through stages.
        c: "Entry condition: StartOnboardingAsync from Inactive, ResumeAsync from Paused, ReactivateAsync from Aborted. Sets StartDate, CurrentStageStartTime. Exit conditions: PauseAsync->Paused, AbortAsync->Aborted, CancelAsync->Cancelled, RejectAsync->Rejected/Terminated, ForceCompleteAsync->Force Completed, natural completion->Completed."
      Onboarding Paused:
        d: Onboarding is temporarily paused. Can be resumed.
        c: "Entry condition: PauseAsync from Active status. Only Active onboardings can be paused. Exit condition: ResumeAsync or ResumeWithConfirmationAsync transitions back to Active."
      Onboarding Completed:
        d: All required stages completed naturally. Terminal state.
        c: "Entry condition: All required stages completed, CompletionRate reaches 100%. Terminal state - no further transitions allowed. ActualCompletionDate is set."
      Onboarding Force Completed:
        d: Manually force-completed by admin regardless of stage progress.
        c: "Entry condition: ForceCompleteAsync with reason. Sets CompletionRate=100, ActualCompletionDate. Terminal state - no further transitions allowed. Requires operate permission."
      Onboarding Aborted:
        d: Onboarding terminated prematurely. Can be reactivated.
        c: "Entry condition: AbortAsync with reason from Active status. Exit condition: ReactivateAsync transitions back to Active. Non-terminal - allows recovery."
      Onboarding Cancelled:
        d: Onboarding cancelled. Terminal state, cannot be resumed.
        c: "Entry condition: CancelAsync with reason. Terminal state - no further transitions allowed. Requires operate permission."
      Onboarding Rejected:
        d: Onboarding rejected during review. Terminal state.
        c: "Entry condition: RejectAsync without TerminateWorkflow flag. Terminal state - no further transitions allowed."
      Onboarding Terminated:
        d: Onboarding terminated with workflow termination flag. Terminal state.
        c: "Entry condition: RejectAsync with TerminateWorkflow=true. Terminal state - no further transitions allowed. Signals that the entire workflow should be considered terminated for this case."
  OnboardingFile:
    t: BusinessObject
    d: "File/attachment associated with a specific Onboarding and optionally a Stage. Supports versioning, categorization, hash-based dedup, and external import tracking."
    c: "OnboardingFile manages attachments. Properties: OnboardingId, StageId (optional), AttachmentId, OriginalFileName, StoredFileName, FileExtension, FileSize, ContentType, Category (Document/Image/Certificate/Other), Description, IsRequired, Tags, AccessUrl, StoragePath, UploadedById, UploadedByName, UploadedDate, Status (Active/Deleted/Archived), Version, FileHash (dedup), SortOrder, IsExternalImport (excludes from inbound-attachments API), Source (CRM/Portal/Manual). Database table: ff_onboarding_file."
  Questionnaire:
    t: BusinessObject
    d: "A dynamic questionnaire with structured sections and questions (supports multiple types, tables, nesting). Assigned to Stages via components. Supports action trigger mappings on questions/options."
    c: "Questionnaire is a configurable form template. Structure stored as JSONB (sections with questions). Properties: Name, Description, Status (Draft/Published/Archived), Structure (JSONB), Version, PreviewImageUrl, Category, Tags (JSONB), EstimatedMinutes, TotalQuestions, RequiredQuestions, AllowDraft, AllowMultipleSubmissions, IsActive. Questions can trigger Actions via ActionTriggerMapping. Assigned to stages via components_json. Database table: ff_questionnaire."
    states:
      Questionnaire Draft:
        d: Questionnaire is being designed. Structure can be modified.
        c: "Entry condition: Created with default status Draft. Structure can be freely modified. Exit condition: PublishAsync transitions to Published (requires valid structure)."
      Questionnaire Published:
        d: Questionnaire is active and available for use in onboarding stages.
        c: "Entry condition: PublishAsync with valid structure (structure is not null). Available for assignment to stages and for filling by customers. Exit condition: ArchiveAsync transitions to Archived."
      Questionnaire Archived:
        d: Questionnaire is archived and no longer active.
        c: "Entry condition: ArchiveAsync. Terminal state - questionnaire is no longer available for new assignments. Existing answers are preserved."
  QuestionnaireAnswer:
    t: BusinessObject
    d: "Stores questionnaire answers for a specific Onboarding+Stage+Questionnaire combination. Supports versioning, draft/submit workflow, and review process."
    c: "QuestionnaireAnswer stores per-onboarding answers for a questionnaire at a specific stage. Properties: OnboardingId, StageId, QuestionnaireId, Answer (JSONB), Status (Draft/Submitted/Approved), CompletionRate (0-100), CurrentSectionIndex, SubmitTime, ReviewTime, ReviewerId, ReviewNotes, Version, IsLatest, Source (customer_portal/admin/integration), IpAddress, UserAgent. Supports versioning (Version + IsLatest). Database table: ff_questionnaire_answers."
    states:
      Answer Draft:
        d: Answer being filled, not yet submitted.
        c: "Entry condition: Created or save draft. Answer can be modified freely. CompletionRate tracks progress per section. Exit condition: Submit action transitions to Submitted."
      Answer Submitted:
        d: Answer submitted for review.
        c: "Entry condition: Submit action. SubmitTime is set. Exit condition: Approved (reviewer approves) or rejected back to Draft."
      Answer Approved:
        d: Answer reviewed and approved.
        c: "Entry condition: Reviewer approves. ReviewTime and ReviewerId set. Terminal state for this version."
  QuickLink:
    t: BusinessObject
    d: "Provides quick navigation links from FlowFlex to external systems. Supports URL parameter placeholders resolved at runtime from onboarding context."
    c: "QuickLink enables navigation to external systems. Properties: IntegrationId, LinkName, Description, TargetUrl (with parameter placeholders), UrlParameters (JSON array - parameter config), DisplayIcon, RedirectType (new tab/same window), IsActive, SortOrder. URL parameters can source values from onboarding fields (PageParameter, LoginUserInfo). Assigned to stages via components_json. Database table: ff_quick_link."
  Stage:
    t: BusinessObject
    d: "A step/phase within a Workflow. Stages are ordered and contain components (Checklists, Questionnaires, Static Fields, QuickLinks, Files). Each Onboarding instance progresses through stages sequentially."
    c: "Stage is the structural building block of a Workflow. It defines assignees (DefaultAssignee, CoAssignees), estimated duration, portal visibility/permission, components configuration (components_json), view/operate team permissions, color, and ordering. Stages bridge Workflow templates and Onboarding execution. In the context of an Onboarding, stage progress tracks: Pending -> InProgress -> Completed/Skipped/Rejected/Terminated. Database table: ff_stage."
    states:
      Stage Active:
        d: Stage is active and participates in workflow execution.
        c: "Entry condition: Created with IsActive=true or reactivated. Stage is included in onboarding progression and visible in workflow configuration. Exit condition: Deactivated (IsActive set to false) or deleted."
      Stage Inactive:
        d: Stage is deactivated and skipped during onboarding progression.
        c: "Entry condition: IsActive set to false by admin. Stage is excluded from onboarding progression but remains in workflow configuration. Exit condition: IsActive set to true (reactivated)."
  StageCondition:
    t: BusinessObject
    d: "Defines condition rules for a stage using Microsoft RulesEngine format. When a stage is completed, conditions are evaluated and configured actions are executed or fallback stage is applied."
    c: "StageCondition uses Microsoft RulesEngine for condition evaluation on stage completion. Properties: StageId, WorkflowId, Name, Description, RulesJson (JSONB - RulesEngine workflow format), ActionsJson (JSONB - action configurations supporting 7 types: GoToStage, SkipStage, EndWorkflow, SendNotification, UpdateField, TriggerAction, AssignUser), FallbackStageId (redirect when condition not met), IsActive, Status (Valid/Invalid/Draft). One active condition per stage. GoToStage/SkipStage/EndWorkflow are stage control actions and are mutually exclusive (only one can execute per evaluation). Database table: ff_stage_condition."
    states:
      Condition Valid:
        d: Condition is valid and active, will be evaluated on stage completion.
        c: "Entry condition: Created with valid rules JSON or rules corrected. IsActive=true, Status=Valid. Will be evaluated when associated stage is completed."
      Condition Draft:
        d: Condition is being configured.
        c: "Entry condition: Created as draft. Status=Draft. Not yet active for evaluation."
  StaticFieldValue:
    t: BusinessObject
    d: "Stores static field values for a specific Onboarding+Stage combination. Supports draft/submit/review workflow with versioning."
    c: "StaticFieldValue stores per-onboarding field values at a specific stage. Properties: OnboardingId, StageId, FieldName, FieldId, DisplayName, FieldValueJson (JSONB), FieldType, IsRequired, Status (Draft/Submitted), CompletionRate, SubmitTime, ReviewTime, ReviewerId, ReviewNotes, Version, IsLatest, IsSubmitted, Source, ValidationStatus (Pending/Valid/Invalid), ValidationErrors, Metadata (JSONB). Replaces deprecated CustomFieldsJson on Onboarding. Database table: ff_static_field_values."
  User:
    t: BusinessObject
    d: Portal user entity for FlowFlex. Manages authentication, email verification, team membership, and login tracking.
    c: "User is the permission subject in FlowFlex. Properties: Username, Email, PasswordHash, EmailVerified, EmailVerificationCode, VerificationCodeExpiry, Status (Pending/Active/Inactive/Locked), LastLoginDate, LastLoginIp, Team. Team field determines team-based permission matching. Linked to IDM (Identity Management) for enterprise SSO. Database table: ff_users."
  UserInvitation:
    t: BusinessObject
    d: Portal access invitation for external customers. Links a customer email to a specific Onboarding for portal access.
    c: "UserInvitation manages portal access tokens. Properties: OnboardingId, Email, InvitationToken (unique), Status (Pending/Active/Inactive/Expired/Used), EncryptedAccessToken, SentDate, TokenExpiry, LastAccessDate, ShortUrlId (MD5 hash for compact links), UserId (if user exists), SendCount, InvitationUrl, Notes. One invitation per email per onboarding. Generates encrypted access tokens and short URLs. Database table: ff_user_invitations."
    states:
      Invitation Pending:
        d: Invitation created but not yet sent or accessed.
        c: "Entry condition: Created with default status Pending. Exit condition: Sent (email delivered) transitions to Active."
      Invitation Active:
        d: Invitation is active and can be used for portal access.
        c: "Entry condition: Sent and not expired. Exit condition: Deactivated (admin action) or expired (TokenExpiry passed)."
      Invitation Expired:
        d: Invitation token has expired.
        c: "Entry condition: Current time > TokenExpiry. Terminal state."
  Workflow:
    t: BusinessObject
    d: "Workflow template that defines the structure of an onboarding process. Acts as a blueprint from which Onboarding instances (Cases) are created. Controls stages, permissions, portal visibility, and lifecycle configuration."
    c: "Workflow is the top-level configuration entity in FlowFlex. It defines an ordered set of Stages, team-based permission controls (ViewPermissionMode, OperateTeams), portal visibility settings, versioning, and lifecycle dates (StartDate/EndDate). A Workflow can be marked as default (only one at a time). It supports duplication, versioning, activation/deactivation, and automatic expiration. Onboarding instances are created from Workflow templates. Database table: ff_workflow."
    states:
      Workflow Active:
        d: Workflow is active and available for creating new Onboarding instances.
        c: "Entry condition: Manual activation via ActivateAsync or creation with default status. IsActive=true, Status=\"active\". Exit condition: Manual deactivation via DeactivateAsync, or automatic expiration when EndDate is reached. Allows creation of new Onboarding instances from this template."
      Workflow Inactive:
        d: Workflow is deactivated and cannot be used for new Onboarding instances.
        c: "Entry condition: Manual deactivation via DeactivateAsync, or automatic expiration processing (ProcessExpiredWorkflowsAsync). IsActive=false, Status=\"inactive\". Exit condition: Manual re-activation via ActivateAsync. Existing Onboarding instances continue to function."

  # --- BusinessProcess ---
  Abort Onboarding:
    t: BusinessProcess
    d: Terminates onboarding prematurely with reason. Can be reactivated later.
    c: "Trigger: AbortAsync with reason. Precondition: Status must be \"Active\". Checks operate permission. Sets Status=Aborted. Appends reason to Notes. Logs operation. Outcome: Status transitions to Aborted."
  Activate Workflow:
    t: BusinessProcess
    d: Sets workflow status to active, making it available for new Onboarding instances.
    c: "Trigger: User action via ActivateAsync. Sets IsActive=true, Status=\"active\". Preserves permission fields during update. Clears cache, logs operation. Outcome: Workflow transitions from Inactive to Active state."
  Advance Stage:
    t: BusinessProcess
    d: Moves onboarding to the next stage when current stage is completed.
    c: "Trigger: Stage completion event. Updates CurrentStageId, CurrentStageOrder, CompletionRate. Recalculates completion rate based on (completedStages/totalStages)*100. If all required stages completed, transitions to Completed. Outcome: CurrentStageId and CurrentStageOrder updated, completion rate recalculated."
  Assign ChecklistTask:
    t: BusinessProcess
    d: Assigns task to a specific user with structured assignee info.
    c: "Trigger: User action via AssignTaskAsync or SetTaskAssigneeAsync. Updates AssigneeId, AssigneeName, AssigneeJson. Outcome: Task assignee updated."
  Assign Onboarding:
    t: BusinessProcess
    d: Assigns onboarding to a specific user and team.
    c: "Trigger: AssignAsync with input. Updates CurrentAssigneeId, CurrentAssigneeName, CurrentTeam. Outcome: Onboarding assignee info updated."
  Batch Complete Tasks:
    t: BusinessProcess
    d: Completes multiple tasks at once with same completion input.
    c: "Trigger: User action via BatchCompleteAsync. Validates all tasks exist and can be completed. Completes each task individually. Outcome: Multiple tasks completed."
  Cancel Onboarding:
    t: BusinessProcess
    d: Cancels onboarding with reason. Terminal state.
    c: "Trigger: CancelAsync with reason. Precondition: Status must not be \"Completed\" (only completed onboardings cannot be cancelled). Checks operate permission. Sets Status=Cancelled. Appends reason to Notes. Logs operation. Outcome: Status transitions to Cancelled (terminal)."
  Check Resource Permission:
    t: BusinessProcess
    d: "Unified permission check using STRICT MODE: Final permission = Workflow ∩ Stage ∩ Case (intersection). Admin/Owner bypass all checks."
    c: "Trigger: Any resource access attempt (view or operate). Steps: 1) Admin bypass (System/Tenant admin). 2) Module-level permission check (IDM). 3) Entity-level permission check (ViewPermissionMode + OperateTeams). For Stage: requires Workflow permission first. For Case: requires Workflow ∩ Stage permission first. Assigned users get special Stage privileges. Portal token bypasses stage permission for PortalAccess endpoints. Outcome: CanView and CanOperate boolean result."
  Combine Stages:
    t: BusinessProcess
    d: Merges multiple stages into one, combining their components.
    c: "Trigger: User action via CombineStagesAsync. Merges components from source stages into target stage. Removes source stages. Outcome: Single combined stage replaces source stages."
  Complete ChecklistTask:
    t: BusinessProcess
    d: Marks task as completed. Validates dependencies are met first. Updates checklist completion rate.
    c: "Trigger: User action or automation via CompleteTaskAsync. Precondition: Task not already completed, CanCompleteAsync passes (dependent task must be completed). Sets IsCompleted=true, CompletedDate, Status=Completed. Clears cache. Logs operation. Recalculates checklist completion rate. Outcome: Task status set to Completed."
  Complete Stage:
    t: BusinessProcess
    d: "Completes a stage for a specific onboarding. Evaluates stage conditions, executes actions, and may redirect to fallback stage."
    c: "Trigger: Stage completion event or user action via CompleteStageAsync. Checks stage exists and is active, validates onboarding exists, checks permission. If StageCondition exists: evaluates via RulesEngine. If condition met: executes configured actions. If condition not met and FallbackStageId configured: redirects onboarding to fallback stage. Logs evaluation and action results. Outcome: Stage marked completed, conditions evaluated, next stage determined."
  Create ChecklistTask:
    t: BusinessProcess
    d: Creates a new task within a checklist. Validates dependency cycles, sets order.
    c: "Trigger: User action via API. Validates no circular dependency (HasCircularDependencyAsync). Auto-sets order if not specified. Creates task in Pending status. Outcome: New task in Pending status."
  Create New Version:
    t: BusinessProcess
    d: Creates a new version of an existing workflow by incrementing the version number and resetting start date.
    c: "Trigger: User action via CreateNewVersionAsync. Increments Version field, resets StartDate to current date. Clears cache. Outcome: Same workflow entity with incremented version number."
  Create Onboarding:
    t: BusinessProcess
    d: "Creates a new onboarding instance from a workflow template. Initializes stage progress, generates case code, sets permissions."
    c: "Trigger: User action via API. Creates Onboarding in Inactive state from Workflow template. Generates CaseCode from CaseName, initializes StagesProgressJson from workflow stages, sets default permissions. Outcome: New Onboarding in Inactive state with initialized stage progress."
  Create Onboarding from Integration:
    t: BusinessProcess
    d: Creates an onboarding instance from external system data (e.g., CRM lead).
    c: "Trigger: Integration webhook or sync. Uses EntityMapping to determine target workflow. Creates Onboarding linked to external entity via SystemId/EntityId/IntegrationId. Outcome: New Onboarding linked to external entity."
  Create Questionnaire:
    t: BusinessProcess
    d: "Creates a new questionnaire with structure, calculates statistics, and syncs action trigger mappings for questions with actions."
    c: "Trigger: User action. Creates questionnaire in Draft status. Calculates TotalQuestions and RequiredQuestions from structure. Syncs ActionTriggerMappings for questions that have configured actions. Outcome: New Questionnaire in Draft status."
  Create Stage:
    t: BusinessProcess
    d: "Creates a new stage within a workflow. Validates workflow permission, name uniqueness, component uniqueness, and syncs component mappings."
    c: "Trigger: User action via API. Preconditions: Workflow exists, user has Operate permission on workflow. Validates stage name uniqueness within workflow (ExistsNameInWorkflowAsync), validates component uniqueness (ValidateComponentUniquenessInWorkflowAsync), validates team selections. Creates entity with auto-order if not specified, syncs component mappings within transaction. Logs operation. Outcome: New Stage entity with components and mappings."
  Create Workflow:
    t: BusinessProcess
    d: Creates a new workflow template with stages, permission settings, and optional default designation.
    c: "Trigger: User action via API. Validates name uniqueness (ExistsNameAsync), validates team selections against IDM team tree, handles default workflow flag (removes previous default if needed), creates entity with stages, syncs component mappings, logs operation. Outcome: New Workflow entity persisted with associated Stages."
  Deactivate Workflow:
    t: BusinessProcess
    d: Sets workflow status to inactive, preventing new Onboarding instances from using it.
    c: "Trigger: User action via DeactivateAsync. Sets IsActive=false, Status=\"inactive\". Preserves permission fields during update. Clears cache, logs operation. Outcome: Workflow transitions from Active to Inactive state."
  Delete Stage:
    t: BusinessProcess
    d: Soft-deletes a stage. Requires confirmation.
    c: "Trigger: User action via API with confirm=true. Marks stage as deleted (soft delete). Outcome: Stage marked as deleted."
  Delete Workflow:
    t: BusinessProcess
    d: Deletes a workflow template. Requires confirmation and no existing stages.
    c: "Trigger: User action via DeleteAsync with confirm=true. Preconditions: No associated stages exist. Clears cache, logs operation. Outcome: Workflow entity removed from database."
  Duplicate Questionnaire:
    t: BusinessProcess
    d: Creates a copy with regenerated IDs in structure JSON.
    c: "Trigger: User action. Copies questionnaire properties, regenerates all IDs within structure JSON to ensure uniqueness. New copy starts in Draft status. Outcome: New Questionnaire copy in Draft."
  Duplicate Stage:
    t: BusinessProcess
    d: Creates a copy of a stage within the same or different workflow.
    c: "Trigger: User action via DuplicateAsync. Copies stage properties, generates unique name, preserves components configuration. Outcome: New Stage created as copy."
  Duplicate Workflow:
    t: BusinessProcess
    d: Creates a copy of an existing workflow with all its stages, ensuring unique naming and resetting version.
    c: "Trigger: User action via DuplicateAsync. Generates unique name, copies workflow properties (resets IsDefault=false, Version=1, UseSameTeamForOperate=true), duplicates all stages preserving order and configuration. Logs operation. Outcome: New Workflow created as copy with duplicated stages."
  Evaluate Stage Condition:
    t: BusinessProcess
    d: "When a stage is completed, evaluates the condition using RulesEngine. If met, executes configured actions. If not met, redirects to fallback stage."
    c: "Trigger: CompleteStageAsync. Finds active StageCondition for the stage. Evaluates RulesJson via RulesEngineService. If condition met: executes ActionsJson via ConditionActionExecutor. If condition not met and FallbackStageId set: updates onboarding CurrentStageId to fallback. Logs evaluation and action results. Outcome: Actions executed OR onboarding redirected."
  Execute Action:
    t: BusinessProcess
    d: Executes an action based on trigger mapping. Runs the configured action (Python/HTTP/Email), records result.
    c: "Trigger: Event matching ActionTriggerMapping. Creates ActionExecution record. Runs configured action based on ActionType (Python script execution, HTTP API call, or SendEmail). Records Success/Failed status. Outcome: ActionExecution record with result."
  Force Complete Onboarding:
    t: BusinessProcess
    d: Manually completes onboarding regardless of stage progress. Sets completion rate to 100%.
    c: "Trigger: ForceCompleteAsync with reason. Checks operate permission. Sets Status=Force Completed, CompletionRate=100, ActualCompletionDate=now. Appends reason to Notes. Logs operation. Outcome: Status transitions to Force Completed (terminal)."
  Pause Onboarding:
    t: BusinessProcess
    d: Temporarily pauses an active onboarding.
    c: "Trigger: PauseAsync. Precondition: Status must be \"Active\". Checks operate permission. Sets Status=Paused. Logs operation. Outcome: Status transitions to Paused."
  Process Expired Workflows:
    t: BusinessProcess
    d: Background job that automatically deactivates workflows whose EndDate has passed.
    c: "Trigger: Scheduled background task via ProcessExpiredWorkflowsAsync. Finds all active workflows with EndDate < now. Sets Status=\"inactive\", IsActive=false for each. Clears cache per workflow. Outcome: Expired workflows automatically deactivated."
  Publish Questionnaire:
    t: BusinessProcess
    d: Publishes a draft questionnaire making it available for use.
    c: "Trigger: PublishAsync. Precondition: Structure is not null AND Status != Published. Sets Status=Published. Outcome: Questionnaire available for stage assignment and customer filling."
  Archive Questionnaire:
    t: BusinessProcess
    d: Archives a published questionnaire, making it unavailable for new assignments.
    c: "Trigger: ArchiveAsync. Precondition: Status is Published. Sets Status=Archived. Existing answers are preserved. Outcome: Questionnaire transitions to Archived (terminal). No longer available for new stage assignments."
  Submit QuestionnaireAnswer:
    t: BusinessProcess
    d: Submits a questionnaire answer for review. Transitions from Draft to Submitted status.
    c: "Trigger: User action via submit endpoint. Precondition: Answer exists in Draft status with sufficient completion. Sets Status=Submitted, SubmitTime=now. Creates new version if versioning enabled (increments Version, sets IsLatest=true on new, false on previous). May trigger ActionTriggerMappings configured on questions. Outcome: Answer transitions from Draft to Submitted."
  Reactivate Onboarding:
    t: BusinessProcess
    d: Reactivates an aborted onboarding back to active state.
    c: "Trigger: ReactivateAsync with reason. Precondition: Status must be \"Aborted\". Checks operate permission. Sets Status=Active. Appends reason to Notes. Logs operation. Outcome: Status transitions to Active."
  Reject Onboarding:
    t: BusinessProcess
    d: Rejects onboarding during review. Can optionally terminate the entire workflow.
    c: "Trigger: RejectAsync with input. Precondition: Status must not be \"Completed\", \"Rejected\", or \"Terminated\". Checks operate permission. If TerminateWorkflow=true: Status=Terminated. Otherwise: Status=Rejected. Both are terminal states. Logs operation. Outcome: Status transitions to Rejected or Terminated."
  Resume Onboarding:
    t: BusinessProcess
    d: Resumes a paused onboarding back to active state.
    c: "Trigger: ResumeAsync or ResumeWithConfirmationAsync. Precondition: Status must be \"Paused\". Checks operate permission. Sets Status=Active. ResumeWithConfirmation allows reason and notes. Logs operation. Outcome: Status transitions to Active."
  Sort ChecklistTasks:
    t: BusinessProcess
    d: Reorders tasks within a checklist.
    c: "Trigger: User drag-and-drop via SortTasksAsync. Updates order_index values for specified tasks. Outcome: Task order updated."
  Sort Stages:
    t: BusinessProcess
    d: Reorders stages within a workflow by updating order_index values.
    c: "Trigger: User drag-and-drop or API via SortStagesAsync. Updates order_index for all affected stages based on new ordering. Outcome: Stage order updated for all affected stages within the workflow."
  Start Onboarding:
    t: BusinessProcess
    d: Activates an inactive onboarding, setting start date and optionally resetting progress.
    c: "Trigger: StartOnboardingAsync. Precondition: Status must be \"Inactive\". Checks operate permission (EnsureCaseOperatePermissionAsync). Sets Status=Active, StartDate=now, CurrentStageStartTime=now. Optionally resets progress if input.ResetProgress=true. Appends to Notes. Logs operation. Outcome: Status transitions to Active."
  Sync Integration Data:
    t: BusinessProcess
    d: Synchronizes data between FlowFlex and external system based on entity/field mappings.
    c: "Trigger: Manual or scheduled sync. Uses Integration authentication config to connect. Reads EntityMapping to determine which external entities map to which workflows. Syncs data bidirectionally based on field mappings. Updates LastSyncDate. Outcome: Data synchronized between systems."
  Trigger Action Event:
    t: BusinessProcess
    d: When a stage/task/question event occurs, finds matching ActionTriggerMappings and queues action executions in order.
    c: "Trigger: Stage completed, Task completed, Question answered. Finds all enabled ActionTriggerMappings matching the trigger source and event. Evaluates trigger_conditions. Queues matching actions for execution in execution_order. Outcome: Matching actions queued for execution."
  Uncomplete ChecklistTask:
    t: BusinessProcess
    d: Reverts a completed task to Pending. Blocked if dependent tasks are already completed.
    c: "Trigger: User action via UncompleteTaskAsync. Precondition: Task is completed AND no completed dependent tasks exist (GetDependentTasksAsync check). Sets IsCompleted=false, CompletedDate=null, Status=Pending. Recalculates checklist completion rate. Outcome: Task reverted to Pending."
  Update Stage:
    t: BusinessProcess
    d: Updates stage configuration including name, assignees, components, permissions, and portal settings.
    c: "Trigger: User action via API. Validates name uniqueness if changed, validates component uniqueness, validates team selections. Detects changes, updates entity, syncs component mappings if components changed, syncs assignees to existing onboardings if assignee changed. Clears cache, logs operation with change details. Outcome: Stage entity updated, mappings synced."
  Update Stage Components:
    t: BusinessProcess
    d: Updates the components configuration (checklists, questionnaires, static fields, files, quicklinks) for a stage.
    c: "Trigger: User action via UpdateComponentsAsync. Validates component uniqueness within workflow. Updates components_json, syncs component mapping tables. Outcome: Components JSON updated, mappings synced."
  Update Workflow:
    t: BusinessProcess
    d: Updates workflow configuration including name, description, stages, permissions, and portal settings.
    c: "Trigger: User action via UpdateAsync. Validates name uniqueness (if changed), validates team selections, detects changes, updates entity, syncs component mappings if stages changed, clears cache, logs operation with change details. Outcome: Workflow entity updated."

