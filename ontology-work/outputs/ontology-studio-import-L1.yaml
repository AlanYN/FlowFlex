  # --- Rule ---
  Action Execution Order:
    t: Rule
    d: When multiple mappings match the same trigger, they execute in order of execution_order field (smaller first).
    c: "Condition: Multiple mappings on same trigger source. Effect: Actions execute sequentially by execution_order (ascending). Evidence: ActionTriggerMapping.ExecutionOrder property."
  Action Failure Non-Blocking:
    t: Rule
    d: A single action execution failure does not prevent subsequent actions in the same trigger from executing.
    c: "Condition: An action in a sequence fails (throws error or times out). Effect: Error is logged and recorded in ActionExecution, but remaining actions in the execution_order sequence continue to execute. This is a deliberate fault-tolerance design — one broken action should not block the entire workflow progression. Evidence: ConditionActionExecutor continues executing remaining actions even if one fails."
  Action Trigger Condition:
    t: Rule
    d: ActionTriggerMapping can have trigger_conditions JSON that must evaluate to true before the action executes.
    c: "Condition: trigger_conditions evaluates to true or is empty/null. Effect: Action execution proceeds if condition met, skipped if not. Evidence: ActionTriggerMapping.TriggerConditions JSONB field."
  Action Type Configuration:
    t: Rule
    d: ActionDefinition.ActionType determines execution method and config schema.
    c: "ActionType determines execution engine: Python (executes Python script), HttpApi (calls external HTTP endpoint), SendEmail (sends email via template). Each type has different action_config JSON schema. Python needs script/params, HttpApi needs url/method/headers/body, SendEmail needs template/recipients/subject. Validated at execution time."
  Admin Permission Bypass:
    t: Rule
    d: System Admin and Tenant Admin bypass all permission checks entirely.
    c: "Condition: User role is System or Tenant admin (checked via PermissionHelpers.IsSystemAdmin/IsTenantAdmin). Effect: All permission checks return CanView=true, CanOperate=true immediately. Evidence: PermissionService checks admin bypass as Step 0 before any other logic."
  Case Code Generation:
    t: Rule
    d: Unique case code generated from CaseName on creation. Used as primary business identifier.
    c: "Condition: Onboarding creation or legacy data migration. CaseCode is auto-generated from CaseName via ICaseCodeGeneratorService.GenerateCaseCodeAsync. Used as primary business identifier in UI and APIs. Evidence: OnboardingUserManagementService.EnsureCaseCodeAsync."
  Component Portal Access Control:
    t: Rule
    d: "Each stage component has CustomerPortalAccess setting (Viewable/Completable/NotAvailable) controlling what external customers can see and do in the portal."
    c: "CustomerPortalAccess enum per component: Viewable (customer can see but not modify), Completable (customer can fill/complete), NotAvailable (hidden from portal). Applied independently per component within a stage. Evidence: StageComponent.CustomerPortalAccess property."
  Component Uniqueness Within Workflow:
    t: Rule
    d: A checklist or questionnaire can only be assigned to one stage within the same workflow.
    c: "Condition: ValidateComponentUniquenessInWorkflowAsync passes. Checks that no checklist ID or questionnaire ID appears in another stage of the same workflow. Effect: Throws error if component already assigned to another stage in same workflow. Evidence: StageService.ValidateComponentUniquenessInWorkflowAsync."
  Condition Fallback Stage:
    t: Rule
    d: When condition is not met and FallbackStageId is configured, onboarding is redirected to the fallback stage.
    c: "Condition: Condition evaluation returns false AND FallbackStageId is not null. Effect: Onboarding CurrentStageId is updated to FallbackStageId instead of advancing normally. Evidence: StageService.CompleteStageAsync redirects to fallback stage when condition not met."
  ConditionAction Types:
    t: Rule
    d: "StageCondition ActionsJson supports 7 action types: GoToStage, SkipStage, EndWorkflow, SendNotification, UpdateField, TriggerAction, AssignUser."
    c: "Each action type has specific behavior: GoToStage (jump to specific stage), SkipStage (skip next N stages), EndWorkflow (force complete the onboarding), SendNotification (send email to users/teams), UpdateField (update onboarding field value), TriggerAction (execute a predefined ActionDefinition via HTTP), AssignUser (assign user/team to a stage). Actions execute sequentially by order field. Per-type timeouts: default 30s, SendNotification 60s, TriggerAction 45s. TriggerAction results are passed as prev_ prefixed fields to subsequent actions (chaining). Evidence: ConditionActionExecutor.cs, StageConditionConstants.cs."
  ConditionAction Stage Control Mutual Exclusion:
    t: Rule
    d: "GoToStage, SkipStage, and EndWorkflow are stage control actions — only one can execute per condition evaluation."
    c: "Condition: ActionsJson contains multiple stage control actions (GoToStage/SkipStage/EndWorkflow). Effect: Only one stage control action is allowed per condition. These three actions directly affect stage progression and are mutually exclusive — GoToStage redirects, SkipStage advances past stages, EndWorkflow terminates. Other action types (SendNotification, UpdateField, TriggerAction, AssignUser) can execute alongside any stage control action. Evidence: StageConditionConstants.cs categorizes these as StageControlActions."
  Integration Authentication Methods:
    t: Rule
    d: "Integration.AuthMethod determines auth strategy: OAuth2 (token refresh flow), ApiKey (header-based), BasicAuth (username/password)."
    c: "AuthMethod enum determines how API calls to external system are authenticated. Credentials stored encrypted in EncryptedCredentials field. OAuth2: requires token endpoint, client_id, client_secret, handles token refresh. ApiKey: sends key in configured header. BasicAuth: sends username/password in Authorization header. Evidence: Integration.cs AuthMethod property and IntegrationService authentication logic."
  No Circular Dependencies:
    t: Rule
    d: Task dependency chain must not form a cycle. Validated recursively on create/update.
    c: "Condition: HasCircularDependencyAsync returns false. Recursively checks dependency chain to detect cycles. Effect: Throws error if circular dependency detected. Evidence: ChecklistTaskService.HasCircularDependencyAsync and HasCircularDependencyRecursiveAsync."
  Onboarding Completion Rate Calculation:
    t: Rule
    d: Completion rate is calculated as (completedStages / totalStages) * 100.
    c: "Condition: Stage advancement or force completion. CompletionRate = (CurrentStageOrder / TotalStages) * 100. ForceComplete sets CompletionRate=100 directly. Evidence: OnboardingStatusService.UpdateCompletionRateAsync and ForceCompleteAsync."
  Onboarding Operate Permission:
    t: Rule
    d: All status operations require operate permission check via EnsureCaseOperatePermissionAsync before execution.
    c: "Condition: User has operate permission on the case (checked via EnsureCaseOperatePermissionAsync). Effect: Throws permission error if not authorized. Applied to: Start, Pause, Resume, Abort, Reactivate, Cancel, Reject, ForceComplete. Evidence: Every status method in OnboardingStatusService calls EnsureCaseOperatePermissionAsync first."
  Onboarding Status Transition Guard:
    t: Rule
    d: Each status operation validates current status before allowing transition.
    c: "Start: only from Inactive. Pause: only from Active. Resume: only from Paused. Abort: only from Active. Reactivate: only from Aborted. Cancel: only blocked from Completed. Reject: blocked from Completed/Rejected/Terminated. ForceComplete: blocked from Completed/Force Completed. Effect: Throws BusinessError if invalid transition attempted. Evidence: OnboardingStatusService validates Status field before each transition."
  Operate Permission Always Whitelist:
    t: Rule
    d: "Operate permission is ALWAYS whitelist-based regardless of ViewPermissionMode. In Public mode, empty OperateTeams means everyone can operate."
    c: "ViewPermissionMode (blacklist/whitelist) only affects View permissions. Operate is always whitelist: user must be in OperateTeams. Exception: Public mode with empty/null OperateTeams means all users can operate. Evidence: WorkflowPermissionService.CheckOperatePermission comment and logic."
  Owner Permission Bypass:
    t: Rule
    d: "Resource owner (Ownership field on Onboarding, CreateUserId on Workflow) bypasses permission checks for owned resources."
    c: "Condition: User ID matches resource owner. For Workflow: CreateUserId. For Onboarding: Ownership field. Effect: Permission checks return true for owned resource. Evidence: PermissionHelpers.IsCurrentUserOwner and Private mode logic."
  Permission Strict Mode (Intersection):
    t: Rule
    d: "Three-level permission intersection: Workflow ∩ Stage ∩ Case. No Workflow permission means no access to Stage or Case."
    c: "Final permission = Workflow ∩ Stage ∩ Case (intersection). Admin/Owner bypass all checks. Assigned users get special Stage privileges. ViewPermissionMode controls visibility: Public, VisibleToTeams, InvisibleToTeams, Private. At Workflow/Stage level, permissions are always Team-based (ViewTeams/OperateTeams). At Onboarding (Case) level, ViewPermissionSubjectType and OperatePermissionSubjectType (Team/User enum) determine whether the system checks Teams or Users fields. When SubjectType=Team, ViewTeams/OperateTeams are used; when SubjectType=User, ViewUsers/OperateUsers are used. Evidence: PermissionService.cs implements strict intersection mode, CasePermissionService checks SubjectType."
  Portal Token Bypass:
    t: Rule
    d: Portal users accessing PortalAccess endpoints bypass stage permission checks.
    c: "Condition: Request has portal token AND endpoint is marked with [PortalAccess] attribute. Effect: Stage permission check returns success immediately. Evidence: PermissionService.CheckStageAccessAsync checks IsPortalTokenWithPortalAccess."
  Questionnaire Publish Guard:
    t: Rule
    d: Cannot publish without valid structure JSON. Cannot publish if already published.
    c: "Condition: Structure is not null AND Status != Published. Effect: Blocks publish if no structure exists or already published. Evidence: QuestionnaireService.PublishAsync validates structure before status change."
  Single Default Workflow:
    t: Rule
    d: Only one workflow can be marked as default at any time.
    c: "Condition: IsDefault=true on create/update. Effect: Previous default workflow has IsDefault set to false via RemoveDefaultWorkflowAsync before new default is set. Evidence: WorkflowService.CreateAsync checks and removes existing default."
  Stage Component Types:
    t: Rule
    d: "Stage components_json supports 5 component keys: fields, checklist, questionnaires, files, quickLinks."
    c: "Each component has Key, IsEnabled, Order, CustomerPortalAccess (Viewable/Completable/NotAvailable), and type-specific IDs (ChecklistIds, QuestionnaireIds, StaticFieldIds, QuickLinkIds). Components determine what content types are available in a stage. Evidence: StageComponent.cs model and StageService component parsing."
  Stage Condition Evaluation:
    t: Rule
    d: When a stage is completed, if a StageCondition exists, it is evaluated via RulesEngine.
    c: "Condition: StageCondition exists and is active for the stage. If condition met: configured actions execute. If condition not met and FallbackStageId configured: onboarding CurrentStageId is updated to fallback stage. Evidence: StageService.CompleteStageAsync evaluates condition via RulesEngineService."
  Stage Name Uniqueness Within Workflow:
    t: Rule
    d: Stage name must be unique within the same workflow.
    c: "Condition: ExistsNameInWorkflowAsync returns false for the given name within the workflow. Validated on create and update (when name changes). Effect: Throws BusinessError if duplicate name in same workflow. Evidence: StageService.CreateAsync and UpdateAsync."
  Stage Workflow Permission:
    t: Rule
    d: User must have Operate permission on the parent workflow to create/modify stages.
    c: "Condition: CheckWorkflowAccessAsync returns CanOperate=true for the user on the parent workflow. Effect: Throws permission error if not authorized. Evidence: StageService.CreateAsync checks workflow permission before stage creation."
  Task Dependency Validation:
    t: Rule
    d: A task cannot be completed if its dependent task (DependsOnTaskId) is not yet completed.
    c: "Condition: DependsOnTaskId is null OR dependent task IsCompleted=true. Checked via CanCompleteAsync. Effect: Blocks completion if dependency not met. Evidence: ChecklistTaskService.CompleteTaskAsync calls CanCompleteAsync."
  Task Uncomplete Guard:
    t: Rule
    d: A completed task cannot be uncompleted if other tasks depend on it and are already completed.
    c: "Condition: No completed dependent tasks exist (GetDependentTasksAsync check). Effect: Blocks uncomplete if dependents are completed. Evidence: ChecklistTaskService.UncompleteTaskAsync checks dependent tasks."
  View Permission Mode Configuration:
    t: Rule
    d: "ViewPermissionMode controls visibility: Public (all can view), VisibleToTeams (whitelist), InvisibleToTeams (blacklist), Private (owner only)."
    c: "Applied at Workflow, Stage, and Onboarding levels independently. Public: returns true for all users. VisibleToTeams: user must be in at least one team listed in ViewTeams. InvisibleToTeams: user must NOT be in any team listed in ViewTeams. Private: only the resource creator (CreateUserId) can view. At Workflow/Stage level, ViewTeams is always the checked field (Team-based only). At Onboarding level, ViewPermissionSubjectType determines whether ViewTeams or ViewUsers is checked. Evidence: WorkflowPermissionService.CheckViewPermission switch expression, CasePermissionService.CheckViewPermission checks SubjectType."
  Workflow Auto-Expiration:
    t: Rule
    d: Workflows with EndDate in the past are automatically set to inactive by background processing.
    c: "Condition: EndDate < current time AND Status=active AND IsActive=true. Effect: Status transitions to inactive, IsActive set to false. Trigger: ProcessExpiredWorkflowsAsync scheduled task. Evidence: WorkflowService.ProcessExpiredWorkflowsAsync."
  Workflow Delete Guard:
    t: Rule
    d: Workflows with existing stages cannot be deleted. Deletion requires explicit confirmation.
    c: "Condition: confirm=true AND no associated stages exist (stages.Any() must be false). Effect: Throws BusinessError if stages exist or confirmation not provided. Evidence: WorkflowService.DeleteAsync checks stages before deletion."
  Workflow Name Uniqueness:
    t: Rule
    d: Workflow name must be unique within the tenant.
    c: "Condition: ExistsNameAsync returns false for the given name. Validated on create and update (when name changes). Effect: Throws BusinessError if name already exists. Evidence: WorkflowService.CreateAsync and UpdateAsync both call ExistsNameAsync."
  Workflow Portal Visibility:
    t: Rule
    d: Workflow.VisibleInPortal controls whether the entire workflow appears in customer portal.
    c: "Condition: VisibleInPortal=true AND PortalPermission set (Viewable or Completable). Effect: Workflow and its stages appear in customer portal with configured access level. PortalPermission controls interaction level. Evidence: Workflow.cs VisibleInPortal and PortalPermission properties."
  Workflow Team Permission Control:
    t: Rule
    d: "View and operate permissions are controlled by team-based subject types with modes: Public, VisibleToTeams, InvisibleToTeams."
    c: "ViewPermissionMode determines visibility: Public (all can view), VisibleToTeams (whitelist), InvisibleToTeams (blacklist). OperateTeams defines which teams can perform CRUD operations. Team selections are validated against IDM team tree via ValidateTeamSelectionsAsync. UseSameTeamForOperate synchronizes operate teams with view teams. Evidence: Workflow.cs properties and WorkflowService.ValidateTeamSelectionsAsync."

