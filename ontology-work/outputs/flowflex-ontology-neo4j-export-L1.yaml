  # --- Rule ---
  Action Config Schema by Type:
    t: Rule
    d: "action_config JSONB structure varies by type: Python needs script/params, HttpApi needs url/method/headers/body, SendEmail needs template/recipients/subject. Validated at execution time."
    c: "condition: action_config matches expected schema for ActionType. rule_type: validation. effect: Execution fails if config is malformed"
  Action Execution Order:
    t: Rule
    d: When multiple mappings match the same trigger, they execute in order of execution_order field (smaller first).
    c: "condition: Multiple mappings on same trigger source. rule_type: priority. effect: Actions execute sequentially by execution_order"
  Action Trigger Condition:
    t: Rule
    d: ActionTriggerMapping can have trigger_conditions JSON that must evaluate to true before the action executes.
    c: "condition: trigger_conditions evaluates to true or is empty. rule_type: branching. effect: Action execution proceeds or is skipped"
  Action Type Configuration:
    t: Rule
    d: "ActionDefinition.ActionType determines execution method: Python (executes Python script), HttpApi (calls external HTTP endpoint), SendEmail (sends email via template). Each type has different action_config JSON schema."
    c: "condition: ActionType field value. rule_type: configuration. effect: Determines execution engine and config schema"
  Admin Permission Bypass:
    t: Rule
    d: System Admin and Tenant Admin bypass all permission checks entirely.
    c: "condition: User role is System or Tenant admin. rule_type: branching. effect: All permission checks return true"
  Case Code Generation:
    t: Rule
    d: Unique case code generated from lead name on creation. Used as primary business identifier.
    c: "condition: Onboarding creation. rule_type: validation. effect: CaseCode field populated with unique value"
  Component Portal Access Control:
    t: Rule
    d: "Each stage component has CustomerPortalAccess setting (Viewable/Completable/NotAvailable) controlling what external customers can see and do in the portal."
    c: "condition: CustomerPortalAccess enum per component. rule_type: configuration. effect: Controls portal visibility and interactivity per component"
  Component Uniqueness Within Workflow:
    t: Rule
    d: A checklist or questionnaire can only be assigned to one stage within the same workflow.
    c: "condition: ValidateComponentUniquenessInWorkflowAsync passes. rule_type: validation. effect: Throws error if component already assigned to another stage in same workflow"
  Condition Fallback Stage:
    t: Rule
    d: "When condition is not met and FallbackStageId is configured, onboarding CurrentStageId is updated to the fallback stage instead of advancing normally."
    c: "condition: Condition not met AND FallbackStageId is not null. rule_type: branching. effect: Onboarding redirected to fallback stage"
  Dynamic Field Type Constraint:
    t: Rule
    d: Field values must conform to the DataType defined in DefineField (text, number, date, select, etc.).
    c: "condition: Value matches DataType. rule_type: validation. effect: Rejects invalid data types"
  Integration Authentication Methods:
    t: Rule
    d: "Integration.AuthMethod determines auth strategy: OAuth2 (token refresh flow), ApiKey (header-based), BasicAuth (username/password). Credentials stored encrypted in EncryptedCredentials field."
    c: "condition: AuthMethod enum value. rule_type: configuration. effect: Determines how API calls to external system are authenticated"
  No Circular Dependencies:
    t: Rule
    d: Task dependency chain must not form a cycle. Validated recursively on create/update.
    c: "condition: HasCircularDependencyAsync returns false. rule_type: validation. effect: Throws error if circular dependency detected"
  Onboarding Completion Rate Calculation:
    t: Rule
    d: Completion rate is calculated as (completedStages / totalStages) * 100, based on CurrentStageOrder.
    c: "condition: Stage advancement or force completion. rule_type: calculation. effect: CompletionRate updated (0-100)"
  Onboarding Operate Permission:
    t: Rule
    d: All status operations require operate permission check via EnsureCaseOperatePermissionAsync before execution.
    c: "condition: User has operate permission on the case. rule_type: validation. effect: Throws permission error if not authorized"
  Onboarding Priority Setting:
    t: Rule
    d: Priority must be set when Stage 1 is completed. Validated via IsPrioritySet flag.
    c: "condition: Stage 1 completion. rule_type: validation. effect: Priority field becomes required"
  Onboarding Status Transition Guard:
    t: Rule
    d: "Each status operation validates current status before allowing transition. E.g., only Inactive can be Started, only Paused can be Resumed, only Aborted can be Reactivated."
    c: "condition: Current status matches allowed source states for the operation. rule_type: transition-guard. effect: Throws BusinessError if invalid transition attempted"
  Owner Permission Bypass:
    t: Rule
    d: Resource owner (Ownership field on Onboarding) bypasses permission checks for owned resources.
    c: "condition: User ID matches Onboarding.Ownership. rule_type: branching. effect: Permission checks return true for owned resource"
  Permission Strict Mode (Intersection):
    t: Rule
    d: "Three-level permission intersection: No Workflow permission 鈫?cannot access Stage or Case. No Stage permission 鈫?cannot access Case in that Stage. Final = Workflow 鈭?Stage 鈭?Case."
    c: "condition: User attempts to access any resource. rule_type: validation. effect: Access granted only if all three levels pass"
  Questionnaire Publish Guard:
    t: Rule
    d: Cannot publish without valid structure JSON. Cannot publish if already published.
    c: "condition: Structure is not null AND Status != Published. rule_type: transition-guard. effect: Blocks publish if no structure"
  Single Default Workflow:
    t: Rule
    d: Only one workflow can be marked as default at any time. Setting a new default removes the previous one.
    c: "condition: IsDefault = true on create/update. rule_type: configuration. effect: Previous default workflow has IsDefault set to false"
  Stage Completion Validation:
    t: Rule
    d: "Before completing a stage, all required components (checklist tasks, questionnaire answers, static fields) must be fulfilled."
    c: "condition: All required items completed. rule_type: validation. effect: Blocks completion if validation fails"
  Stage Component Types:
    t: Rule
    d: "Stage components_json supports 5 component keys: fields (StaticFields), checklist (ChecklistIds), questionnaires (QuestionnaireIds), files (attachment management), quickLinks (QuickLinkIds). Each has IsEnabled, Order, and CustomerPortalAccess."
    c: "condition: components_json parsed. rule_type: configuration. effect: Determines what content types are available in a stage"
  Stage Condition Evaluation:
    t: Rule
    d: "When a stage is completed, if a StageCondition exists, it is evaluated via RulesEngine. If condition is met, configured actions execute. If not met, onboarding may redirect to fallback stage."
    c: "condition: StageCondition exists and is active for the stage. rule_type: branching. effect: Actions executed or fallback stage applied"
  Stage Name Uniqueness Within Workflow:
    t: Rule
    d: Stage name must be unique within the same workflow.
    c: "condition: ExistsNameInWorkflowAsync returns false. rule_type: validation. effect: Throws BusinessError if duplicate name in same workflow"
  Stage Portal Visibility:
    t: Rule
    d: "Stage.VisibleInPortal controls per-stage portal visibility. Stage.PortalPermission overrides workflow-level setting for that specific stage."
    c: "condition: Stage.VisibleInPortal=true. rule_type: configuration. effect: Stage appears in portal with its own permission level"
  Stage Workflow Permission:
    t: Rule
    d: User must have Operate permission on the parent workflow to create/modify stages.
    c: "condition: CheckWorkflowAccessAsync returns CanOperate=true. rule_type: validation. effect: Throws permission error if not authorized"
  Task Dependency Validation:
    t: Rule
    d: A task cannot be completed if its dependent task (DependsOnTaskId) is not yet completed. Checked via CanCompleteAsync.
    c: "condition: DependsOnTaskId is null OR dependent task IsCompleted=true. rule_type: transition-guard. effect: Blocks completion if dependency not met"
  Task Uncomplete Guard:
    t: Rule
    d: A completed task cannot be uncompleted if other tasks depend on it and are already completed.
    c: "condition: No completed dependent tasks exist. rule_type: transition-guard. effect: Blocks uncomplete if dependents are completed"
  View Permission Mode Configuration:
    t: Rule
    d: "ViewPermissionMode controls visibility: Public (all can view), VisibleToTeams (whitelist), InvisibleToTeams (blacklist), Private (owner only). Applied at Workflow, Stage, and Onboarding levels."
    c: "condition: ViewPermissionMode enum value. rule_type: configuration. effect: Filters resource visibility based on user team membership"
  "Workflow Auto-Expiration":
    t: Rule
    d: Workflows with EndDate in the past are automatically set to inactive by background processing.
    c: "condition: EndDate < current time AND Status = active. rule_type: transition-guard. effect: Status transitions to inactive, IsActive set to false"
  Workflow Delete Guard:
    t: Rule
    d: Default workflows cannot be deleted. Workflows with active onboardings require confirmation.
    c: "condition: IsDefault = false AND (no active onboardings OR confirm = true). rule_type: validation. effect: Allows or blocks deletion"
  Workflow Name Uniqueness:
    t: Rule
    d: Workflow name must be unique within the tenant. Validated on create and update.
    c: "condition: ExistsNameAsync returns false. rule_type: validation. effect: Throws BusinessError if name already exists"
  Workflow Portal Visibility:
    t: Rule
    d: "Workflow.VisibleInPortal controls whether the entire workflow appears in customer portal. Workflow.PortalPermission (Viewable/Completable) controls interaction level."
    c: "condition: VisibleInPortal=true AND PortalPermission set. rule_type: configuration. effect: Workflow and its stages appear in customer portal with configured access level"
  Workflow Team Permission Control:
    t: Rule
    d: "View and operate permissions are controlled by team-based or user-based subject types with modes: Public, VisibleToTeams, InvisibleToTeams, Private."
    c: "condition: ViewPermissionMode and OperateTeams configured. rule_type: configuration. effect: Filters workflow visibility and operability per user/team context"

rels:
  # --- DEPENDS_ON ---
  - ActionTriggerMapping -> DEPENDS_ON (ActionTriggerMapping references ActionDefinition via ActionDefinitionId) -> ActionDefinition
  - Checklist -> DEPENDS_ON (Checklist assigned to Stage via components_json) -> Stage
  - ChecklistTask -> DEPENDS_ON (ChecklistTask belongs to a Checklist (ChecklistId FK)) -> Checklist
  - ChecklistTaskCompletion -> DEPENDS_ON (Completion record for specific Onboarding) -> Onboarding
  - ChecklistTaskCompletion -> DEPENDS_ON (Completion record for specific ChecklistTask) -> ChecklistTask
  - EntityMapping -> DEPENDS_ON (EntityMapping belongs to Integration) -> Integration
  - InternalNote -> DEPENDS_ON (Note belongs to Onboarding, optionally to Stage) -> Onboarding
  - Message -> DEPENDS_ON (Message linked to Onboarding via RelatedEntityId/RelatedEntityType) -> Onboarding
  - Onboarding -> DEPENDS_ON (Onboarding is created from a Workflow template via WorkflowId) -> Workflow
  - OnboardingFile -> DEPENDS_ON (File belongs to Onboarding, optionally to Stage) -> Onboarding
  - Questionnaire -> DEPENDS_ON (Questionnaire assigned to Stage via components_json) -> Stage
  - QuestionnaireAnswer -> DEPENDS_ON (Answer belongs to Onboarding+Stage+Questionnaire) -> Onboarding
  - QuestionnaireAnswer -> DEPENDS_ON (Answer for specific questionnaire) -> Questionnaire
  - QuickLink -> DEPENDS_ON (QuickLink belongs to Integration) -> Integration
  - QuickLink -> DEPENDS_ON (QuickLink assigned to Stage via components_json) -> Stage
  - Stage -> DEPENDS_ON (Stage belongs to a Workflow (1:N). WorkflowId is required FK.) -> Workflow
  - StageCondition -> DEPENDS_ON (StageCondition belongs to a Stage (StageId FK). One active condition per stage.) -> Stage
  - StaticFieldValue -> DEPENDS_ON (Field value for specific Onboarding+Stage) -> Onboarding
  - StaticFieldValue -> DEPENDS_ON (Field value associated with Stage) -> Stage
  - UserInvitation -> DEPENDS_ON (Invitation linked to specific Onboarding via OnboardingId) -> Onboarding
  # --- CONSTRAINS ---
  - ActionTriggerMapping -> CONSTRAINS (Mapping can trigger on Stage events (Completed)) -> Stage
  - ActionTriggerMapping -> CONSTRAINS (Mapping can trigger on Task events (Completed)) -> ChecklistTask
  - ActionTriggerMapping -> CONSTRAINS (Mapping can trigger on Question answered events) -> Questionnaire
  - DynamicData -> CONSTRAINS (DynamicData fields extend Onboarding with custom properties per module) -> Onboarding
  - Integration -> CONSTRAINS (Integration defines which external entities map to onboardings) -> Onboarding
  - User -> CONSTRAINS (User is the permission subject for team-based access control) -> Onboarding
  # --- CONSUMES ---
  - Check Resource Permission -> CONSUMES -> Workflow
  - Check Resource Permission -> CONSUMES -> Stage
  - Check Resource Permission -> CONSUMES -> Onboarding
  - Create Onboarding -> CONSUMES -> Workflow
  - Create Onboarding from Integration -> CONSUMES -> Integration
  - Evaluate Stage Condition -> CONSUMES -> StageCondition
  - Execute Action -> CONSUMES -> ActionDefinition
  - Sync Integration Data -> CONSUMES -> Integration
  - Trigger Action Event -> CONSUMES -> ActionTriggerMapping
  - Validate Stage Completion -> CONSUMES -> Stage
  # --- PRODUCES ---
  - Create ChecklistTask -> PRODUCES -> ChecklistTask
  - Create New Version -> PRODUCES -> Workflow
  - Create Onboarding -> PRODUCES -> Onboarding
  - Create Onboarding from Integration -> PRODUCES -> Onboarding
  - Create Questionnaire -> PRODUCES -> Questionnaire
  - Create Stage -> PRODUCES -> Stage
  - Define Dynamic Field -> PRODUCES -> DynamicData
  - Duplicate Questionnaire -> PRODUCES -> Questionnaire
  - Duplicate Stage -> PRODUCES -> Stage
  - Duplicate Workflow -> PRODUCES -> Workflow
  # --- DRIVES ---
  - Abort Onboarding -> DRIVES (Transitions to Aborted) -> Onboarding
  - Activate Workflow -> DRIVES (Transitions to Active state) -> Workflow
  - Advance Stage -> DRIVES (Advances stage progress) -> Onboarding
  - Assign ChecklistTask -> DRIVES (Updates assignee) -> ChecklistTask
  - Assign Onboarding -> DRIVES (Updates assignee info) -> Onboarding
  - Batch Complete Tasks -> DRIVES (Batch transitions to Completed) -> ChecklistTask
  - Cancel Onboarding -> DRIVES (Transitions to Cancelled) -> Onboarding
  - Combine Stages -> DRIVES (Merges stages) -> Stage
  - Complete ChecklistTask -> DRIVES (Transitions to Completed) -> ChecklistTask
  - Complete Stage -> DRIVES (Marks stage completed in onboarding context) -> Stage
  - Complete Stage -> DRIVES (Advances onboarding to next stage) -> Onboarding
  - Create Workflow -> DRIVES (Creates new Workflow instance) -> Workflow
  - Deactivate Workflow -> DRIVES (Transitions to Inactive state) -> Workflow
  - Delete Stage -> DRIVES (Soft-deletes Stage) -> Stage
  - Force Complete Onboarding -> DRIVES (Transitions to Force Completed) -> Onboarding
  - Pause Onboarding -> DRIVES (Transitions Active to Paused) -> Onboarding
  - Process Expired Workflows -> DRIVES (Auto-deactivates expired workflows) -> Workflow
  - Publish Questionnaire -> DRIVES (Transitions Draft to Published) -> Questionnaire
  - Reactivate Onboarding -> DRIVES (Transitions Aborted to Active) -> Onboarding
  - Reject Onboarding -> DRIVES (Transitions to Rejected/Terminated) -> Onboarding
  - Resume Onboarding -> DRIVES (Transitions Paused to Active) -> Onboarding
  - Set Default Workflow -> DRIVES (Sets IsDefault flag) -> Workflow
  - Sort ChecklistTasks -> DRIVES (Reorders tasks) -> ChecklistTask
  - Sort Stages -> DRIVES (Reorders stages) -> Stage
  - Start Onboarding -> DRIVES (Transitions Inactive to Active) -> Onboarding
  - Store Dynamic Data -> DRIVES (Stores field values) -> DynamicData
  - Sync Integration Data -> DRIVES (Updates onboarding fields from external system data) -> Onboarding
  - Sync Stage Component Mappings -> DRIVES (Syncs mapping tables) -> Stage
  - Uncomplete ChecklistTask -> DRIVES (Reverts to Pending) -> ChecklistTask
  - Update Stage -> DRIVES (Modifies Stage configuration) -> Stage
  - Update Stage Components -> DRIVES (Updates components config) -> Stage
  - Update Workflow -> DRIVES (Modifies Workflow configuration) -> Workflow
  # --- GOVERNED_BY ---
  - Advance Stage -> GOVERNED_BY -> Onboarding Completion Rate Calculation
  - Advance Stage -> GOVERNED_BY -> Onboarding Priority Setting
  - Check Resource Permission -> GOVERNED_BY -> Permission Strict Mode (Intersection)
  - Check Resource Permission -> GOVERNED_BY -> Admin Permission Bypass
  - Check Resource Permission -> GOVERNED_BY -> Owner Permission Bypass
  - Check Resource Permission -> GOVERNED_BY -> View Permission Mode Configuration
  - Complete ChecklistTask -> GOVERNED_BY -> Task Dependency Validation
  - Complete Stage -> GOVERNED_BY -> Stage Condition Evaluation
  - Create ChecklistTask -> GOVERNED_BY -> No Circular Dependencies
  - Create Onboarding -> GOVERNED_BY -> Case Code Generation
  - Create Stage -> GOVERNED_BY -> Stage Name Uniqueness Within Workflow
  - Create Stage -> GOVERNED_BY -> Component Uniqueness Within Workflow
  - Create Stage -> GOVERNED_BY -> Stage Workflow Permission
  - Create Workflow -> GOVERNED_BY -> Workflow Name Uniqueness
  - Create Workflow -> GOVERNED_BY -> Single Default Workflow
  - Create Workflow -> GOVERNED_BY -> Workflow Team Permission Control
  - Evaluate Stage Condition -> GOVERNED_BY -> Condition Fallback Stage
  - Execute Action -> GOVERNED_BY -> Action Type Configuration
  - Execute Action -> GOVERNED_BY -> Action Config Schema by Type
  - Integration -> GOVERNED_BY -> Integration Authentication Methods
  - Pause Onboarding -> GOVERNED_BY -> Onboarding Status Transition Guard
  - Pause Onboarding -> GOVERNED_BY -> Onboarding Operate Permission
  - Process Expired Workflows -> GOVERNED_BY -> Workflow Auto-Expiration
  - Publish Questionnaire -> GOVERNED_BY -> Questionnaire Publish Guard
  - Resume Onboarding -> GOVERNED_BY -> Onboarding Status Transition Guard
  - Resume Onboarding -> GOVERNED_BY -> Onboarding Operate Permission
  - Set Default Workflow -> GOVERNED_BY -> Single Default Workflow
  - Stage -> GOVERNED_BY -> Stage Component Types
  - Stage -> GOVERNED_BY -> Component Portal Access Control
  - Stage -> GOVERNED_BY -> Stage Portal Visibility
  - Start Onboarding -> GOVERNED_BY -> Onboarding Status Transition Guard
