# Ontology: FlowFlex Onboarding Workflow Engine
# Layer 1: Lossless structural compression
# Original: 302339 chars | Compressed: 67776 chars | Ratio: 77.6%

nodes:
  # --- BusinessObject ---
  ActionDefinition:
    t: BusinessObject
    d: "Defines an automated action that can be triggered by events in the system. Types include Python scripts, HTTP API calls, and SendEmail. Reusable across multiple trigger points."
    c: "lifecycle_summary: Enabled / Disabled. Can be AI-generated.. notes: Actions are the automation engine of FlowFlex. They execute when triggered by stage completion, task completion, or questionnaire answers via ActionTriggerMapping.. object_type: decision-orchestration. alias: ff_action_definitions"
    states:
      Action Enabled:
        d: Action is enabled and can be triggered.
        c: "entry_condition: Created with IsEnabled=true or re-enabled. state_type: intermediate. exit_condition: Disabled"
      Action Disabled:
        d: Action is disabled and will not execute.
        c: "entry_condition: IsEnabled set to false. state_type: suspended. exit_condition: IsEnabled set to true"
  ActionTriggerMapping:
    t: BusinessObject
    d: "Maps an ActionDefinition to a specific trigger source (Stage, Task, or Question) with event type, conditions, and execution order. Enables reusable action-to-event binding."
    c: "lifecycle_summary: Enabled / Disabled. notes: Trigger events: Completed, Created, Updated, Answered. Supports conditional execution via trigger_conditions JSON and custom mapping_config.. object_type: decision-orchestration. alias: ff_action_trigger_mappings"
  Checklist:
    t: BusinessObject
    d: "A task list template or instance containing ordered ChecklistTasks. Assigned to Stages via Stage Components. Supports template/instance pattern."
    c: "lifecycle_summary: Active / Inactive. Type: Template or Instance.. notes: Checklists are assigned to stages via components_json. A checklist can only be assigned to one stage within the same workflow (component uniqueness rule).. object_type: control-boundary. alias: ff_checklist"
  ChecklistTask:
    t: BusinessObject
    d: "An individual task item within a Checklist. Supports task dependencies, assignees, priorities, due dates, and action bindings."
    c: "lifecycle_summary: Pending -> InProgress -> Completed / Blocked / Cancelled. Supports uncomplete (revert to Pending).. notes: Tasks can have dependencies (DependsOnTaskId). Task types: Manual, Automatic, Document, Approval. Can be linked to ActionDefinitions for automation.. object_type: execution-carrier. alias: ff_checklist_task"
    states:
      Task Pending:
        d: Task created but not started.
        c: "entry_condition: Task created or uncompleted. state_type: initial. exit_condition: Task started or completed"
      Task InProgress:
        d: Task is being worked on.
        c: "entry_condition: Task started by assignee. state_type: intermediate. exit_condition: Task completed, blocked, or cancelled"
      Task Completed:
        d: Task has been completed with optional notes and actual hours.
        c: "entry_condition: CompleteTaskAsync with dependency check passed. state_type: terminal. exit_condition: UncompleteTaskAsync (if no completed dependents)"
      Task Blocked:
        d: Task is blocked by dependency or external factor.
        c: "entry_condition: Dependent task not completed. state_type: suspended. exit_condition: Dependency resolved"
      Task Cancelled:
        d: Task has been cancelled.
        c: "entry_condition: Admin cancellation. state_type: terminal. exit_condition: None"
  ChecklistTaskCompletion:
    t: BusinessObject
    d: "Per-onboarding completion record for a checklist task. Tracks whether a specific task is completed for a specific onboarding instance (since tasks are shared templates)."
    c: "lifecycle_summary: Not Completed -> Completed (with timestamp and notes). notes: Bridges ChecklistTask (template) and Onboarding (instance). Allows same task definition to have different completion states per onboarding. Supports file attachments via FilesJson.. object_type: execution-carrier. alias: ff_checklist_task_completion"
  DynamicData:
    t: BusinessObject
    d: "Dynamic data system consisting of DefineField (field definitions) and BusinessData (field values). Enables configurable custom fields per module without schema changes."
    c: "lifecycle_summary: Fields: defined -> active. Data: stored as JSONB in BusinessData.InternalData.. notes: DefineField defines field metadata (type, validation, display). BusinessData stores actual values. FieldGroup organizes fields. Supports computed fields, static fields, system-defined fields. DataTypes include text, number, date, select, multi-select, etc.. object_type: control-boundary. alias: ff_define_field + ff_business_data + ff_data_value + ff_field_group"
    states:
      DynamicField Active:
        d: Field definition is active and visible.
        c: "entry_condition: Created with IsHidden=false. state_type: intermediate. exit_condition: Hidden or deleted"
      DynamicField Hidden:
        d: Field definition exists but is hidden from UI.
        c: "entry_condition: IsHidden set to true. state_type: suspended. exit_condition: IsHidden set to false"
  EntityMapping:
    t: BusinessObject
    d: "Maps external system entity types to FlowFlex entity types for integration data sync. Defines which external entities (leads, customers) map to which workflows."
    c: "lifecycle_summary: Active / Inactive. notes: Each mapping links an external entity type to WFE entity type and specific workflow IDs. SystemId is auto-generated for external reference.. object_type: control-boundary. alias: ff_entity_mapping"
  Integration:
    t: BusinessObject
    d: "Represents a connection to an external system (CRM, ERP, Marketing, etc.). Manages authentication, entity mappings, field mappings, and data synchronization."
    c: "lifecycle_summary: Connected / Disconnected / Error / Pending. notes: Supports OAuth2, API Key, Basic Auth. Has inbound/outbound attachment configs. Links to EntityMapping and FieldMapping for data sync. Provides QuickLinks for external navigation.. object_type: control-boundary. alias: ff_integration"
    states:
      Integration Connected:
        d: Integration is connected and operational.
        c: "entry_condition: Successful authentication. state_type: intermediate. exit_condition: Disconnection or error"
      Integration Disconnected:
        d: Integration is configured but not connected.
        c: "entry_condition: Created or manually disconnected. state_type: initial. exit_condition: Successful connection"
      Integration Error:
        d: Integration encountered an error during sync or authentication.
        c: "entry_condition: Connection or sync failure. state_type: error. exit_condition: Error resolved and reconnected"
  InternalNote:
    t: BusinessObject
    d: "Internal team notes on an Onboarding or Stage. Supports threading (ParentNoteId), mentions, resolution tracking, and visibility control."
    c: "lifecycle_summary: Open -> Resolved. Types: General/Important/Warning/Question.. notes: Visibility: Public/Internal/Private. Supports @mentions via MentionedUserIds. Reply threading via ParentNoteId. Tags for categorization.. object_type: execution-carrier. alias: ff_internal_notes"
  Message:
    t: BusinessObject
    d: "Unified message entity supporting Internal messages, Email (via Outlook integration), and Portal messages. Supports threading, folders, labels, attachments, and read/star/archive states."
    c: "lifecycle_summary: Draft -> Sent (Inbox/Sent). Folder management: Inbox/Sent/Starred/Archive/Trash.. notes: Messages are linked to Onboarding via RelatedEntityId. Supports conversation threading via ConversationId and ParentMessageId. Owner-based mailbox model.. object_type: lifecycle-driven. alias: ff_messages"
    states:
      Message Draft:
        d: Message is being composed, not yet sent.
        c: "entry_condition: Created with IsDraft=true. state_type: initial. exit_condition: Sent"
      Message Inbox:
        d: Received message in inbox.
        c: "entry_condition: Received from sender. state_type: intermediate. exit_condition: Archived, Trashed, or Starred"
      Message Sent:
        d: Message has been sent.
        c: "entry_condition: Send action. state_type: intermediate. exit_condition: Archived or Trashed"
      Message Archived:
        d: Message moved to archive.
        c: "entry_condition: Archive action. state_type: terminal. exit_condition: Restore"
      Message Trash:
        d: Message moved to trash.
        c: "entry_condition: Delete/Trash action. state_type: terminal. exit_condition: Restore to OriginalFolder"
  Onboarding:
    t: BusinessObject
    d: "A customer/lead onboarding workflow instance. Each Onboarding is created from a Workflow template and tracks the progress of a specific customer through all stages."
    c: "lifecycle_summary: Inactive -> Active -> Completed/Force Completed/Paused/Aborted/Cancelled/Rejected/Terminated. notes: Core business entity. Tracks stage progress, assignees, permissions, priority, completion rate. Linked to CRM leads via LeadId/EntityId.. object_type: lifecycle-driven. alias: ff_onboarding"
    states:
      Inactive:
        d: Workflow is deactivated and cannot be used for new Onboarding instances
        c: "entry_condition: Manual deactivation via DeactivateAsync or automatic expiration processing. state_type: intermediate. exit_condition: Manual re-activation via ActivateAsync"
      Active:
        d: Workflow is active and available for creating new Onboarding instances
        c: "entry_condition: Manual activation via ActivateAsync or creation with default status. state_type: intermediate. exit_condition: Manual deactivation, deletion, or automatic expiration when EndDate is reached"
      Paused:
        d: Onboarding is temporarily paused. Can be resumed.
        c: "entry_condition: PauseAsync from Active. state_type: intermediate. exit_condition: ResumeAsync or ResumeWithConfirmationAsync"
      Completed:
        d: All required stages completed naturally. Terminal state.
        c: "entry_condition: All required stages completed. state_type: terminal. exit_condition: None (terminal)"
      Force Completed:
        d: Manually force-completed by admin regardless of stage progress.
        c: "entry_condition: ForceCompleteAsync with reason. state_type: terminal. exit_condition: None (terminal)"
      Aborted:
        d: Onboarding terminated prematurely. Can be reactivated.
        c: "entry_condition: AbortAsync with reason. state_type: suspended. exit_condition: ReactivateAsync"
      Cancelled:
        d: Onboarding cancelled. Cannot be resumed.
        c: "entry_condition: CancelAsync with reason. state_type: terminal. exit_condition: None (terminal)"
      Rejected:
        d: Onboarding rejected during review.
        c: "entry_condition: RejectAsync. state_type: terminal. exit_condition: None (terminal)"
      Terminated:
        d: Onboarding terminated with workflow termination flag.
        c: "entry_condition: RejectAsync with TerminateWorkflow=true. state_type: terminal. exit_condition: None (terminal)"
  OnboardingFile:
    t: BusinessObject
    d: "File/attachment associated with a specific Onboarding and optionally a Stage. Supports versioning, categorization, hash-based dedup, and external import tracking."
    c: "lifecycle_summary: Active -> Archived / Deleted. notes: Files can come from portal upload, CRM integration, or manual upload. IsExternalImport flag excludes from inbound-attachments API. Categories: Document, Image, Certificate, Other.. object_type: lifecycle-driven. alias: ff_onboarding_file"
  Questionnaire:
    t: BusinessObject
    d: "A dynamic questionnaire with structured sections and questions (supports multiple types, tables, nesting). Assigned to Stages via components. Supports action trigger mappings on questions/options."
    c: "lifecycle_summary: Draft -> Published -> Archived. notes: Structure stored as JSONB. Questions can trigger Actions via ActionTriggerMapping. Supports versioning, duplication, categories, tags.. object_type: control-boundary. alias: ff_questionnaire"
    states:
      Questionnaire Draft:
        d: Questionnaire is being designed. Structure can be modified.
        c: "entry_condition: Created. state_type: initial. exit_condition: PublishAsync"
      Questionnaire Published:
        d: Questionnaire is active and available for use in onboarding stages.
        c: "entry_condition: PublishAsync with valid structure. state_type: intermediate. exit_condition: ArchiveAsync"
      Questionnaire Archived:
        d: Questionnaire is archived and no longer active.
        c: "entry_condition: ArchiveAsync. state_type: terminal. exit_condition: None"
  QuestionnaireAnswer:
    t: BusinessObject
    d: "Stores questionnaire answers for a specific Onboarding+Stage+Questionnaire combination. Supports versioning, draft/submit workflow, and review process."
    c: "lifecycle_summary: Draft -> Submitted -> Approved/Rejected. Supports versioning (Version + IsLatest).. notes: Answer stored as JSONB. Tracks completion rate per section. Source tracks origin (customer_portal, admin, integration). Supports review workflow with ReviewerId and ReviewNotes.. object_type: execution-carrier. alias: ff_questionnaire_answers"
    states:
      Answer Draft:
        d: Answer being filled, not yet submitted.
        c: "entry_condition: Created or save draft. state_type: initial. exit_condition: Submit"
      Answer Submitted:
        d: Answer submitted for review.
        c: "entry_condition: Submit action. state_type: intermediate. exit_condition: Approved or Rejected"
      Answer Approved:
        d: Answer reviewed and approved.
        c: "entry_condition: Reviewer approves. state_type: terminal. exit_condition: None"
  QuickLink:
    t: BusinessObject
    d: "Provides quick navigation links from FlowFlex to external systems. Supports URL parameter placeholders resolved at runtime from onboarding context."
    c: "lifecycle_summary: Active / Inactive. notes: URL parameters can source values from onboarding fields. RedirectType controls new tab vs same window. Assigned to stages via components_json.. object_type: control-boundary. alias: ff_quick_link"
  Stage:
    t: BusinessObject
    d: "A step/phase within a Workflow. Stages are ordered and contain components (Checklists, Questionnaires, Static Fields). Each Onboarding instance progresses through stages sequentially."
    c: "lifecycle_summary: Stages themselves are active/inactive as configuration. In context of an Onboarding, stage progress tracks: Pending -> InProgress -> Completed/Rejected/Terminated.. notes: Stages define assignees, estimated duration, portal visibility, components, and conditions. They bridge Workflow templates and Onboarding execution.. object_type: lifecycle-driven. alias: ff_stage"
    states:
      Stage Active:
        d: Stage is active and participates in workflow execution.
        c: "entry_condition: Created with IsActive=true or reactivated. state_type: intermediate. exit_condition: Deactivated or deleted"
      Stage Inactive:
        d: Stage is deactivated and skipped during onboarding progression.
        c: "entry_condition: IsActive set to false. state_type: suspended. exit_condition: IsActive set to true"
  StageCondition:
    t: BusinessObject
    d: "Defines condition rules for a stage using Microsoft RulesEngine format. When a stage is completed, conditions are evaluated and configured actions are executed or fallback stage is applied."
    c: "lifecycle_summary: Valid / Invalid / Draft. Active / Inactive.. notes: Uses RulesEngine JSON for condition evaluation. Actions JSON defines what happens when condition is met. FallbackStageId defines where to go when condition is NOT met.. object_type: decision-orchestration. alias: ff_stage_condition"
    states:
      Condition Valid:
        d: Condition is valid and active, will be evaluated on stage completion.
        c: "entry_condition: Created with valid rules JSON. state_type: intermediate. exit_condition: Invalidated or deactivated"
      Condition Invalid:
        d: Condition has invalid rules configuration.
        c: "entry_condition: Rules validation fails. state_type: error. exit_condition: Rules corrected"
      Condition Draft:
        d: Condition is being configured.
        c: "entry_condition: Created as draft. state_type: initial. exit_condition: Validated"
  StaticFieldValue:
    t: BusinessObject
    d: "Stores static field values for a specific Onboarding+Stage combination. Supports draft/submit/review workflow with versioning."
    c: "lifecycle_summary: Draft -> Submitted -> Validated/ValidationFailed. Supports versioning.. notes: Replaces deprecated CustomFieldsJson on Onboarding. Each record is one field value for one onboarding+stage. Supports validation status and review workflow.. object_type: execution-carrier. alias: ff_static_field_values"
    states:
      FieldValue Draft:
        d: Field value saved but not submitted.
        c: "entry_condition: Created. state_type: initial. exit_condition: Submit"
      FieldValue Submitted:
        d: Field value submitted.
        c: "entry_condition: IsSubmitted=true. state_type: intermediate. exit_condition: Validated"
  User:
    t: BusinessObject
    d: Portal user entity for FlowFlex. Manages authentication, email verification, team membership, and login tracking.
    c: "lifecycle_summary: Pending (email unverified) -> Active (verified) -> Inactive/Locked. notes: Users are the permission subjects. Team field determines team-based permission matching. Linked to IDM (Identity Management) for enterprise SSO.. object_type: lifecycle-driven. alias: ff_users"
  UserInvitation:
    t: BusinessObject
    d: Portal access invitation for external customers. Links a customer email to a specific Onboarding for portal access.
    c: "lifecycle_summary: Pending -> Active -> Inactive/Expired/Used. notes: Generates encrypted access tokens and short URLs. Tracks send count and last access. One invitation per email per onboarding.. object_type: lifecycle-driven. alias: ff_user_invitations"
    states:
      Invitation Pending:
        d: Invitation created but not yet sent or accessed.
        c: "entry_condition: Created. state_type: initial. exit_condition: Sent or accessed"
      Invitation Active:
        d: Invitation is active and can be used for portal access.
        c: "entry_condition: Sent and not expired. state_type: intermediate. exit_condition: Deactivated or expired"
      Invitation Expired:
        d: Invitation token has expired.
        c: "entry_condition: TokenExpiry date passed. state_type: terminal. exit_condition: None"
      Invitation Inactive:
        d: Invitation manually deactivated.
        c: "entry_condition: Admin deactivation. state_type: terminal. exit_condition: None"
  Workflow:
    t: BusinessObject
    d: "Workflow template that defines the structure of an onboarding process, including stages, permissions, and lifecycle configuration. Acts as a blueprint from which Onboarding instances are created."
    c: "lifecycle_summary: active / inactive (controlled by manual activation/deactivation or automatic expiration). notes: A Workflow can be marked as default. It contains ordered Stages. Supports versioning, duplication, and team-based permission control.. object_type: control-boundary. alias: ff_workflow"
    states:
      Active:
        d: Workflow is active and available for creating new Onboarding instances
        c: "entry_condition: Manual activation via ActivateAsync or creation with default status. state_type: intermediate. exit_condition: Manual deactivation, deletion, or automatic expiration when EndDate is reached"
      Inactive:
        d: Workflow is deactivated and cannot be used for new Onboarding instances
        c: "entry_condition: Manual deactivation via DeactivateAsync or automatic expiration processing. state_type: intermediate. exit_condition: Manual re-activation via ActivateAsync"
  # --- BusinessProcess ---
  Abort Onboarding:
    t: BusinessProcess
    d: Terminates onboarding prematurely with reason. Can be reactivated later.
    c: "process_level: child. trigger: AbortAsync. outcome: Status transitions to Aborted"
  Activate Workflow:
    t: BusinessProcess
    d: Sets workflow status to active, making it available for new Onboarding instances.
    c: "process_level: child. trigger: User action via ActivateAsync. outcome: Status set to active, cache cleared, operation logged"
  Advance Stage:
    t: BusinessProcess
    d: Moves onboarding to the next stage when current stage is completed.
    c: "process_level: parent. trigger: Stage completion event. outcome: CurrentStageId and CurrentStageOrder updated, completion rate recalculated"
  Assign ChecklistTask:
    t: BusinessProcess
    d: Assigns task to a specific user with structured assignee info.
    c: "process_level: child. trigger: User action. outcome: AssigneeId, AssigneeName, AssigneeJson updated"
  Assign Onboarding:
    t: BusinessProcess
    d: Assigns onboarding to a specific user and team.
    c: "process_level: child. trigger: AssignAsync. outcome: CurrentAssignee and CurrentTeam updated"
  Batch Complete Tasks:
    t: BusinessProcess
    d: Completes multiple tasks at once with same completion input.
    c: "process_level: parent. trigger: User action via API. outcome: Multiple tasks completed"
  Cancel Onboarding:
    t: BusinessProcess
    d: Cancels onboarding with reason. Terminal state.
    c: "process_level: child. trigger: CancelAsync. outcome: Status transitions to Cancelled"
  Check Resource Permission:
    t: BusinessProcess
    d: "Unified permission check using STRICT MODE: Final permission = Workflow 鈭?Stage 鈭?Case (intersection). Admin/Owner bypass all checks. Assigned users get special Stage privileges."
    c: "process_level: parent. trigger: Any resource access attempt. outcome: CanView and CanOperate boolean result"
  Combine Stages:
    t: BusinessProcess
    d: Merges multiple stages into one, combining their components.
    c: "process_level: parent. trigger: User action via API. outcome: Single combined stage replaces source stages"
  Complete ChecklistTask:
    t: BusinessProcess
    d: Marks task as completed. Validates dependencies are met first. Updates checklist completion rate.
    c: "process_level: parent. trigger: User action or automation. outcome: Task status set to Completed, checklist rate recalculated"
  Complete Stage:
    t: BusinessProcess
    d: "Completes a stage for a specific onboarding. Evaluates stage conditions, executes actions, and may redirect to fallback stage."
    c: "process_level: parent. trigger: Stage completion event or user action. outcome: Stage marked completed in onboarding progress, conditions evaluated, next stage determined"
  Create ChecklistTask:
    t: BusinessProcess
    d: Creates a new task within a checklist. Validates dependency cycles, sets order.
    c: "process_level: parent. trigger: User action via API. outcome: New task in Pending status"
  Create New Version:
    t: BusinessProcess
    d: Creates a new version of an existing workflow, incrementing the version number.
    c: "process_level: parent. trigger: User action via CreateNewVersionAsync. outcome: New workflow version created with incremented version number"
  Create Onboarding:
    t: BusinessProcess
    d: "Creates a new onboarding instance from a workflow template. Initializes stage progress, generates case code, sets permissions."
    c: "process_level: parent. trigger: User action via API. outcome: New Onboarding in Inactive state with initialized stage progress"
  Create Onboarding from Integration:
    t: BusinessProcess
    d: Creates an onboarding instance from external system data (e.g., CRM lead).
    c: "process_level: parent. trigger: Integration webhook or sync. outcome: New Onboarding linked to external entity via SystemId/EntityId"
  Create Questionnaire:
    t: BusinessProcess
    d: "Creates a new questionnaire with structure, calculates statistics, and syncs action trigger mappings for questions with actions."
    c: "process_level: parent. trigger: User action. outcome: New Questionnaire in Draft status"
  Create Stage:
    t: BusinessProcess
    d: "Creates a new stage within a workflow. Validates workflow permission, name uniqueness, component uniqueness, and syncs component mappings."
    c: "process_level: parent. trigger: User action via API. outcome: New Stage entity with components and mappings"
  Create Workflow:
    t: BusinessProcess
    d: "Creates a new workflow template with stages, permission settings, and optional default designation. Validates name uniqueness and team selections."
    c: "process_level: parent. trigger: User action via API. outcome: New Workflow entity persisted with associated Stages"
  Deactivate Workflow:
    t: BusinessProcess
    d: Sets workflow status to inactive, preventing new Onboarding instances from using it.
    c: "process_level: child. trigger: User action via DeactivateAsync. outcome: Status set to inactive, cache cleared, operation logged"
  Define Dynamic Field:
    t: BusinessProcess
    d: Creates a new field definition with type, validation, display settings, and module assignment.
    c: "process_level: parent. trigger: Admin configuration. outcome: New DefineField record"
  Delete Stage:
    t: BusinessProcess
    d: Soft-deletes a stage. Requires confirmation if stage has active onboardings.
    c: "process_level: parent. trigger: User action via API. outcome: Stage marked as deleted"
  Duplicate Questionnaire:
    t: BusinessProcess
    d: Creates a copy with regenerated IDs in structure JSON.
    c: "process_level: parent. trigger: User action. outcome: New Questionnaire copy in Draft"
  Duplicate Stage:
    t: BusinessProcess
    d: Creates a copy of a stage within the same or different workflow.
    c: "process_level: parent. trigger: User action via API. outcome: New Stage created as copy"
  Duplicate Workflow:
    t: BusinessProcess
    d: Creates a copy of an existing workflow with all its stages. Ensures unique naming and resets version.
    c: "process_level: parent. trigger: User action via DuplicateAsync. outcome: New Workflow created as copy with duplicated stages"
  Evaluate Stage Condition:
    t: BusinessProcess
    d: "When a stage is completed, evaluates the condition using RulesEngine. If met, executes configured actions. If not met, redirects to fallback stage."
    c: "process_level: parent. trigger: CompleteStageAsync. outcome: Actions executed OR onboarding redirected to fallback stage"
  Execute Action:
    t: BusinessProcess
    d: "Executes an action based on trigger mapping. Creates ActionExecution record, runs the configured action (Python/HTTP/Email), records result."
    c: "process_level: parent. trigger: Event matching ActionTriggerMapping. outcome: ActionExecution record with Success/Failed status"
  Force Complete Onboarding:
    t: BusinessProcess
    d: Manually completes onboarding regardless of stage progress. Sets completion rate to 100%.
    c: "process_level: child. trigger: ForceCompleteAsync. outcome: Status transitions to Force Completed"
  Pause Onboarding:
    t: BusinessProcess
    d: Temporarily pauses an active onboarding.
    c: "process_level: child. trigger: PauseAsync. outcome: Status transitions to Paused"
  Process Expired Workflows:
    t: BusinessProcess
    d: Background job that automatically deactivates workflows whose EndDate has passed.
    c: "process_level: parent. trigger: Scheduled background task. outcome: Expired workflows set to inactive status"
  Publish Questionnaire:
    t: BusinessProcess
    d: Publishes a draft questionnaire making it available for use. Validates structure exists.
    c: "process_level: child. trigger: PublishAsync. outcome: Status set to Published"
  Reactivate Onboarding:
    t: BusinessProcess
    d: Reactivates an aborted onboarding back to active state.
    c: "process_level: child. trigger: ReactivateAsync. outcome: Status transitions to Active"
  Reject Onboarding:
    t: BusinessProcess
    d: Rejects onboarding during review. Can optionally terminate the entire workflow.
    c: "process_level: child. trigger: RejectAsync. outcome: Status transitions to Rejected or Terminated"
  Resume Onboarding:
    t: BusinessProcess
    d: Resumes a paused onboarding back to active state.
    c: "process_level: child. trigger: ResumeAsync/ResumeWithConfirmationAsync. outcome: Status transitions to Active"
  Set Default Workflow:
    t: BusinessProcess
    d: Marks a workflow as the default. Only one workflow can be default at a time.
    c: "process_level: child. trigger: User action. outcome: Previous default removed, new default set"
  Sort ChecklistTasks:
    t: BusinessProcess
    d: Reorders tasks within a checklist.
    c: "process_level: child. trigger: User drag-and-drop. outcome: Task order_index values updated"
  Sort Stages:
    t: BusinessProcess
    d: Reorders stages within a workflow by updating order_index values.
    c: "process_level: child. trigger: User drag-and-drop or API. outcome: Stage order updated for all affected stages"
  Start Onboarding:
    t: BusinessProcess
    d: Activates an inactive onboarding, setting start date and optionally resetting progress.
    c: "process_level: child. trigger: StartOnboardingAsync. outcome: Status transitions to Active"
  Store Dynamic Data:
    t: BusinessProcess
    d: Stores business data values against defined fields in JSONB format.
    c: "process_level: parent. trigger: User data entry. outcome: BusinessData record with InternalData JSONB"
  Sync Integration Data:
    t: BusinessProcess
    d: Synchronizes data between FlowFlex and external system based on entity/field mappings.
    c: "process_level: parent. trigger: Manual or scheduled sync. outcome: Data synchronized, LastSyncDate updated"
  Sync Stage Component Mappings:
    t: BusinessProcess
    d: "When stage components_json is updated, synchronizes checklist_stage_mapping and questionnaire_stage_mapping tables to maintain referential integrity."
    c: "process_level: child. trigger: Stage create/update with components. outcome: Mapping tables synced with components_json"
  Trigger Action Event:
    t: BusinessProcess
    d: When a stage/task/question event occurs, finds matching ActionTriggerMappings and queues action executions in order.
    c: "process_level: parent. trigger: Stage completed, Task completed, Question answered. outcome: Matching actions queued for execution"
  Uncomplete ChecklistTask:
    t: BusinessProcess
    d: Reverts a completed task to Pending. Blocked if dependent tasks are already completed.
    c: "process_level: parent. trigger: User action. outcome: Task reverted to Pending, checklist rate recalculated"
  Update Stage:
    t: BusinessProcess
    d: Updates stage configuration including name, assignees, components, permissions, and portal settings.
    c: "process_level: parent. trigger: User action via API. outcome: Stage entity updated, mappings synced, cache invalidated"
  Update Stage Components:
    t: BusinessProcess
    d: Updates the components configuration (checklists, questionnaires, static fields) for a stage.
    c: "process_level: child. trigger: User action via API. outcome: Components JSON updated, mappings synced"
  Update Workflow:
    t: BusinessProcess
    d: Updates workflow configuration including name, description, stages, permissions, and portal settings.
    c: "process_level: parent. trigger: User action via API. outcome: Workflow entity updated, cache invalidated, change logged"
  Validate Stage Completion:
    t: BusinessProcess
