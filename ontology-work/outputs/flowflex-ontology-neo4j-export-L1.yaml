  # --- TRANSITIONS_TO ---
  - Aborted -> TRANSITIONS_TO (Status = Aborted) -> Active
  - Action Disabled -> TRANSITIONS_TO (Admin action) -> Action Enabled
  - Action Enabled -> TRANSITIONS_TO (Admin action) -> Action Disabled
  - Active -> TRANSITIONS_TO (EndDate reached or manual deactivation) -> Inactive
  - Active -> TRANSITIONS_TO (Status != Completed) -> Paused
  - Active -> TRANSITIONS_TO (All required stages completed) -> Completed
  - Active -> TRANSITIONS_TO (Status != Completed/ForceCompleted) -> Force Completed
  - Active -> TRANSITIONS_TO (Status != Completed/Aborted) -> Aborted
  - Active -> TRANSITIONS_TO (Status != Completed) -> Cancelled
  - Active -> TRANSITIONS_TO (Status != Completed/Rejected/Terminated) -> Rejected
  - Active -> TRANSITIONS_TO (Status != Completed/Rejected/Terminated) -> Terminated
  - Answer Draft -> TRANSITIONS_TO (Required fields filled) -> Answer Submitted
  - Answer Submitted -> TRANSITIONS_TO (Reviewer action) -> Answer Approved
  - Answer Submitted -> TRANSITIONS_TO (Reviewer action) -> Answer Draft
  - Condition Draft -> TRANSITIONS_TO (Rules JSON is valid) -> Condition Valid
  - Condition Invalid -> TRANSITIONS_TO (Validation passes) -> Condition Valid
  - Condition Valid -> TRANSITIONS_TO (Validation fails) -> Condition Invalid
  - DynamicField Active -> TRANSITIONS_TO (Admin action) -> DynamicField Hidden
  - DynamicField Hidden -> TRANSITIONS_TO (Admin action) -> DynamicField Active
  - FieldValue Draft -> TRANSITIONS_TO (IsSubmitted set to true) -> FieldValue Submitted
  - Inactive -> TRANSITIONS_TO (Manual activation by user) -> Active
  - Inactive -> TRANSITIONS_TO (Status = Inactive) -> Active
  - Integration Connected -> TRANSITIONS_TO (Manual or error) -> Integration Disconnected
  - Integration Connected -> TRANSITIONS_TO (API error) -> Integration Error
  - Integration Disconnected -> TRANSITIONS_TO (Valid credentials) -> Integration Connected
  - Integration Error -> TRANSITIONS_TO (Error resolved) -> Integration Connected
  - Invitation Active -> TRANSITIONS_TO (Current time > TokenExpiry) -> Invitation Expired
  - Invitation Active -> TRANSITIONS_TO (Admin action) -> Invitation Inactive
  - Invitation Pending -> TRANSITIONS_TO (Email sent) -> Invitation Active
  - Message Draft -> TRANSITIONS_TO (Recipients set) -> Message Sent
  - Message Inbox -> TRANSITIONS_TO (User action) -> Message Archived
  - Message Inbox -> TRANSITIONS_TO (User action) -> Message Trash
  - Message Sent -> TRANSITIONS_TO (User action) -> Message Archived
  - Message Sent -> TRANSITIONS_TO (User action) -> Message Trash
  - Paused -> TRANSITIONS_TO (Status = Paused) -> Active
  - Questionnaire Draft -> TRANSITIONS_TO (Structure is not null/empty) -> Questionnaire Published
  - Questionnaire Published -> TRANSITIONS_TO (Admin action) -> Questionnaire Archived
  - Stage Active -> TRANSITIONS_TO (Admin action) -> Stage Inactive
  - Stage Inactive -> TRANSITIONS_TO (Admin action) -> Stage Active
  - Task Blocked -> TRANSITIONS_TO (Dependent task completed) -> Task Pending
  - Task Completed -> TRANSITIONS_TO (No completed dependent tasks exist) -> Task Pending
  - Task InProgress -> TRANSITIONS_TO (Dependencies met) -> Task Completed
  - Task InProgress -> TRANSITIONS_TO (Dependent task uncompleted) -> Task Blocked
  - Task Pending -> TRANSITIONS_TO (Assignee begins work) -> Task InProgress
  - Task Pending -> TRANSITIONS_TO (Dependencies met) -> Task Completed
